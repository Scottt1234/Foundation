<script>
(() => {
  'use strict';

  // ── Layer data ─────────────────────────────────────────────────
  // Each layer becomes a rail card + a big card. `anim` selects its animation
  // ('mining', 'tasks', 'convo'); anything else gets a swappable placeholder.
  const LAYERS = [
    { num:'01', name:'Process Mining',  tag:'System',  color:'#8fb8ff', anim:'mining',
      claim:'See how you actually run.',
      sub:'No workshops, no whiteboards. Your own event logs draw the process exactly as it happened.',
      desc:'Reconstructs how a process actually runs inside a system from event logs: every variant, bottleneck and rework loop.' },
    { num:'02', name:'Task Mining',     tag:'Desktop', color:'#8fb8ff', anim:'tasks',
      claim:'See the work your systems can&rsquo;t.',
      sub:'Process mining stops at the system boundary. Task mining sees the spreadsheets, emails and workarounds in between.',
      desc:'Captures the work between systems at the desktop: the look-ups, emails and manual hand-offs that process mining alone cannot see.' },
    { num:'03', name:'Analysis',        tag:'Insight', color:'#8fb8ff', anim:'analysis',
      claim:'Size what&rsquo;s at stake.',
      sub:'Every delay, loop and workaround gets quantified. You know the impact, and what fixing it is worth.',
      desc:'Quantifies the impact of inefficiency and the value of recoverable waste, turning observation into a business case.' },
    { num:'04', name:'Recommendation',  tag:'AI',      color:'#8fb8ff', anim:'recommend',
      claim:'Know exactly how to fix it.',
      sub:'AI studies your process and proposes the specific fix. You stay in charge of the decision.',
      desc:'AI proposes the specific change to make: not just the problem, but the mechanism that fixes it.' },
    { num:'05', name:'Simulation',      tag:'Proof',   color:'#8fb8ff', anim:'simulate',
      claim:'Test the fix before you commit.',
      sub:'Run the change in a digital copy of your process first. See the impact before anything touches the real thing.',
      desc:'Validates the recommendation before you commit, modelling the impact across cost, time and risk.' },
    { num:'06', name:'Monitor',         tag:'Live',    color:'#8fb8ff', anim:'monitor',
      claim:'Keep it fixed.',
      sub:'Processes drift back to old habits. Monitoring watches live and flags it the moment it starts.',
      desc:'Watches the process in production, confirming the change held and catching drift the moment it appears.' },
  ];
  const FOUNDATION = { num:'07', name:'Conversational Interface', tag:'Underpins all', color:'#8fb8ff', anim:'convo',
    claim:'Anyone can ask, anytime.',
    sub:'No dashboards to learn, no analyst to wait for. Ask in plain English and get an answer backed by evidence.',
    desc:'The layer that underpins every other: ask any question in plain English and get an evidence-backed answer drawn from all six layers above.' };

  const STEPS = LAYERS.length + 1;            // 6 layers + conversational interface
  const FINALE = STEPS + 1;                   // closing frame: the whole stack, lit
  const ALL = LAYERS.concat([FOUNDATION]);    // index aligned with focus steps 1..7

  // ── Task Mining animation (the work between the systems) ────────
  // One SVG (viewBox 1000×560). A single source system opens centre-top (echoing
  // Process Mining), generic app windows fade in around it, faint between-tool
  // activity (a dashed rim with ghost tokens) surfaces, then a central intelligence
  // element ignites and captures it — every source spoked inward with bright inflow.
  // Generic app glyphs (drawn in a ~14px local box) used for the TM extras.
  // The four "non-logged" sources that fade in around the System in Beat 2 —
  // each drawn as a miniature app window (chrome dots + name + app-specific
  // content) so they read as the real tools the work happens in. The pulsing
  // .tm-act elements are each app's live activity: a loading page, an unread
  // mail, an active cell, a line being written.
  const TM_APPS = [
    { cx: 130, cy: 120, name: 'Browser', body: `
        <rect class="tm-ui" x="-42" y="-19" width="84" height="9" rx="4.5"/>
        <circle class="tm-ui-dot" cx="-37" cy="-14.5" r="1.6"/>
        <rect class="tm-ui-fill" x="-42" y="-4" width="36" height="22" rx="2"/>
        <rect class="tm-ui-fill" x="-1" y="-4" width="43" height="8" rx="2"/>
        <rect class="tm-ui-fill" x="-1" y="8" width="43" height="8" rx="2"/>
        <rect class="tm-act" x="-1" y="22" width="30" height="4" rx="2" style="animation-delay:6.2s"/>` },
    { cx: 260, cy: 130, name: 'Email', body: `
        <circle class="tm-ui-dot" cx="-40" cy="-15" r="2.6"/><rect class="tm-ui-fill" x="-32" y="-18" width="64" height="6" rx="2"/>
        <circle class="tm-ui-dot" cx="-40" cy="-2" r="2.6"/><rect class="tm-ui-fill" x="-32" y="-5" width="52" height="6" rx="2"/>
        <circle class="tm-ui-dot" cx="-40" cy="11" r="2.6"/><rect class="tm-ui-fill" x="-32" y="8" width="58" height="6" rx="2"/>
        <circle class="tm-act" cx="-40" cy="24" r="2.6" style="animation-delay:6.35s"/>
        <rect class="tm-act" x="-32" y="21" width="44" height="6" rx="2" style="animation-delay:6.35s"/>` },
    { cx: 260, cy: 470, name: 'Spreadsheet', body: `
        <rect class="tm-ui-fill" x="-42" y="-19" width="86" height="11.5"/>
        <path class="tm-ui" d="M-42,-19 H44 M-42,-7.5 H44 M-42,4 H44 M-42,15.5 H44 M-42,27 H44 M-42,-19 V27 M-20.5,-19 V27 M1,-19 V27 M22.5,-19 V27 M44,-19 V27"/>
        <rect class="tm-act" x="1" y="4" width="21.5" height="11.5" style="animation-delay:6.5s"/>` },
    { cx: 130, cy: 480, name: 'Notes', body: `
        <rect class="tm-ui" x="-42" y="-19" width="8" height="8" rx="1.5"/><path class="tm-ui" d="M-40.5,-15.5 l2,2.2 l3.6,-4.4"/>
        <rect class="tm-ui-fill" x="-29" y="-17" width="60" height="5" rx="2"/>
        <rect class="tm-ui" x="-42" y="-4" width="8" height="8" rx="1.5"/><path class="tm-ui" d="M-40.5,-0.5 l2,2.2 l3.6,-4.4"/>
        <rect class="tm-ui-fill" x="-29" y="-2" width="48" height="5" rx="2"/>
        <rect class="tm-ui" x="-42" y="11" width="8" height="8" rx="1.5"/>
        <rect class="tm-act" x="-29" y="13" width="52" height="5" rx="2" style="animation-delay:6.65s"/>
        <rect class="tm-act" x="-29" y="22" width="34" height="5" rx="2" style="animation-delay:6.8s"/>` },
  ];

  function buildTaskMining() {
    // Beat-1 stream from System into Engine (infinite loop, 30 dots, base delay 1.5s
    // so they only become visible after the System's records have appeared).
    const sysStream = (() => {
      let s = 0xC0FFEE;
      const rnd = () => { s = (s * 1103515245 + 12345) & 0x7FFFFFFF; return s / 0x7FFFFFFF; };
      const N = 30, BASE_DELAY = 1.5;
      let html = '';
      for (let i = 0; i < N; i++) {
        const sy = 268 + Math.floor(rnd() * 100);
        const endX = 365 + Math.floor(rnd() * 10);
        const endY = 295 + Math.floor(rnd() * 10);
        const tx = endX - 190;
        const ty = endY - sy;
        const dur = (1.0 + rnd() * 0.6).toFixed(2);
        const delay = (BASE_DELAY + rnd() * 1.4).toFixed(2);
        html += `<circle class="pm-rt" cx="190" cy="${sy}" r="2.5" style="--tx:${tx}px;--ty:${ty}px;animation-duration:${dur}s;animation-delay:${delay}s"/>`;
      }
      return html;
    })();

    // Beat-3 stream from extras into Engine (infinite loop, ~6 dots per extra,
    // base delay 11.31s — the moment Beat 3 begins).
    const extraStream = (() => {
      let s = 0xCAFEBABE;
      const rnd = () => { s = (s * 1103515245 + 12345) & 0x7FFFFFFF; return s / 0x7FFFFFFF; };
      const PER_EXTRA = 6, BASE_DELAY = 10.4;
      let html = '';
      TM_APPS.forEach(ex => {
        for (let i = 0; i < PER_EXTRA; i++) {
          const sx = ex.cx + (rnd() - 0.5) * 26;
          const sy = ex.cy + (rnd() - 0.5) * 18;
          const endX = 365 + Math.floor(rnd() * 10);
          const endY = 295 + Math.floor(rnd() * 10);
          const tx = endX - sx;
          const ty = endY - sy;
          const dur = (1.0 + rnd() * 0.6).toFixed(2);
          const delay = (BASE_DELAY + rnd() * 1.4).toFixed(2);
          html += `<circle class="pm-rt" cx="${sx.toFixed(0)}" cy="${sy.toFixed(0)}" r="2.5" style="--tx:${tx.toFixed(0)}px;--ty:${ty.toFixed(0)}px;animation-duration:${dur}s;animation-delay:${delay}s"/>`;
        }
      });
      return html;
    })();

    // Extras: enlarged again to 100×75 (33% wider, 36% taller than previous 75×55).
    // Glyph scaled 2.4× from its 14×14 base. Faded in during Beat 2.
    const extrasHTML = TM_APPS.map((ex, i) => {
      const delay = (5.5 + i * 0.12).toFixed(2);
      return `<g class="tm-extra" transform="translate(${ex.cx},${ex.cy})" style="animation-delay:${delay}s">
        <rect class="tm-extra-box" x="-50" y="-37.5" width="100" height="75" rx="12"/>
        <circle class="tm-win-dot" cx="-42" cy="-30" r="2"/>
        <circle class="tm-win-dot" cx="-35.5" cy="-30" r="2"/>
        <circle class="tm-win-dot" cx="-29" cy="-30" r="2"/>
        <text class="tm-win-name" x="-21" y="-27.2">${ex.name}</text>
        <line class="tm-ui-div" x1="-50" y1="-24" x2="50" y2="-24"/>
        ${ex.body}
      </g>`;
    }).join('');

    const scene = document.createElement('div');
    scene.className = 'tm-scene pi-cardscene';
    scene.innerHTML = `
      <div class="pi-narr"></div>
      <svg class="pi-cardsvg" viewBox="0 0 1000 540" preserveAspectRatio="xMidYMid meet" aria-hidden="true">

        <!-- ── System (carried over from Process Mining; appears at t=0) ── -->
        <g class="pm-sys">
          <rect class="pm-sys-box" x="50" y="190" width="140" height="200" rx="14"/>
          <ellipse class="pm-sys-cyl-top" cx="82" cy="226" rx="18" ry="5.5"/>
          <path class="pm-sys-cyl" d="M64,226 V250 a18,5.5 0 0 0 36,0 V226"/>
          <path class="pm-sys-cyl" d="M64,238 a18,5.5 0 0 0 36,0" opacity="0.7"/>
          <text class="pm-sys-label" x="112" y="232">System</text>
          <rect class="pm-rec" x="66" y="280" width="106" height="6" rx="2" style="animation-delay:0.5s"/>
          <rect class="pm-rec" x="66" y="296" width="86"  height="6" rx="2" style="animation-delay:0.55s"/>
          <rect class="pm-rec" x="66" y="312" width="106" height="6" rx="2" style="animation-delay:0.6s"/>
          <rect class="pm-rec" x="66" y="328" width="68"  height="6" rx="2" style="animation-delay:0.65s"/>
          <rect class="pm-rec" x="66" y="344" width="96"  height="6" rx="2" style="animation-delay:0.7s"/>
          <rect class="pm-rec" x="66" y="358" width="78"  height="6" rx="2" style="animation-delay:0.75s"/>
        </g>

        <!-- ── System → Engine streaming dots (Beat 1+, infinite from t=1.5s) ── -->
        ${sysStream}

        <!-- ── Engine (carried over from PM; appears at t=0.3s, spinning from t=0.7s) ── -->
        <g class="pm-eng" transform="translate(370,300)">
          <circle class="pm-eng-halo" cx="0" cy="0" r="55"/>
          <g class="pm-eng-ring">
            <path class="pm-eng-arc" d="M0,-30 A30,30 0 0 1 30,0"/>
            <path class="pm-eng-arc" d="M30,0 A30,30 0 0 1 0,30"/>
            <path class="pm-eng-arc" d="M0,30 A30,30 0 0 1 -30,0"/>
            <path class="pm-eng-arc" d="M-30,0 A30,30 0 0 1 0,-30"/>
            <circle class="pm-eng-orb pm-eng-orb-1" cx="0"   cy="-30" r="7"/>
            <circle class="pm-eng-orb pm-eng-orb-2" cx="30"  cy="0"   r="7"/>
            <circle class="pm-eng-orb pm-eng-orb-3" cx="0"   cy="30"  r="7"/>
            <circle class="pm-eng-orb pm-eng-orb-4" cx="-30" cy="0"   r="7"/>
          </g>
          <circle class="pm-eng-core" cx="0" cy="0" r="11"/>
        </g>

        <!-- ── Extras (Beat 2): non-logged tools fade in around the System ── -->
        ${extrasHTML}


        <!-- ── Dark connections (Beat 2): the routes exist but carry nothing;
             they brighten when task mining switches on in Beat 3 ── -->
        <line class="tm-conn" x1="172" y1="152" x2="316" y2="260" style="animation-delay:6.10s, 10.20s"/>
        <line class="tm-conn" x1="288" y1="166" x2="334" y2="244" style="animation-delay:6.22s, 10.20s"/>
        <line class="tm-conn" x1="288" y1="434" x2="334" y2="356" style="animation-delay:6.34s, 10.20s"/>
        <line class="tm-conn" x1="172" y1="448" x2="316" y2="340" style="animation-delay:6.46s, 10.20s"/>

        <!-- ── Extras → Engine streaming dots (Beat 3+, infinite from t=10.4s) ── -->
        ${extraStream}

        <!-- ── Process map carried over from PM's end state (visible immediately,
             no animation). Plain cyan nodes — the bottleneck and alt-path nodes
             are no longer specially highlighted. The .tm-static class overrides
             the default invisible-state and skips the .tm-scene.playing animations. ── -->
        <!-- forward + alt + rework1 edges (all static — visible from frame 1) -->
        <path class="pm-edge tm-static" pathLength="1" d="M506,300 L564,300"/>
        <path class="pm-edge tm-static" pathLength="1" d="M616,300 L674,300"/>
        <path class="pm-edge pm-edge--alt tm-static" pathLength="1" d="M608,318 C640,400 670,440 700,440"/>
        <path class="pm-edge tm-static" pathLength="1" d="M726,300 L784,300"/>
        <path class="pm-edge pm-edge--alt tm-static" pathLength="1" d="M700,440 C730,440 760,400 792,318"/>
        <path class="pm-edge tm-static" pathLength="1" d="M836,300 L894,300"/>
        <path class="pm-edge pm-edge--rework tm-static" pathLength="1" d="M804,276 C796,210 716,210 708,276"/>

        <!-- ── Beat 3 NEW variants and node — the streams ignite first (10.4s),
             then after a breath the new variants animate in from 13.5s, ordered
             strictly left → right by their starting x: cause, then effect. ── -->
        <!-- 1. N1 → N3 above the spine (skip past N2) — leftmost (starts x=484) -->
        <path class="pm-edge pm-edge--alt" pathLength="1" style="animation-delay:13.5s" d="M484,278 C540,200 660,200 696,278"/>
        <!-- 2. N1 → upper alt-path node (NEW diagonal lift) (starts x=498) -->
        <path class="pm-edge pm-edge--alt" pathLength="1" style="animation-delay:13.65s" d="M498,282 C530,260 555,180 574,154"/>
        <!-- 3. N2 → upper (vertical lift) (starts x=590) -->
        <path class="pm-edge pm-edge--alt" pathLength="1" style="animation-delay:13.8s" d="M590,278 C586,240 586,200 590,162"/>
        <!-- 4. Upper alt-path node + core pop in once both incoming edges have arrived -->
        <circle class="pm-node" cx="590" cy="140" r="22" style="animation-delay:13.95s"/>
        <circle class="pm-core" cx="590" cy="140" r="6"  style="animation-delay:14.1s"/>
        <!-- 5. upper → N4 edge (long diagonal across) (starts x=610) -->
        <path class="pm-edge pm-edge--alt" pathLength="1" style="animation-delay:14.1s" d="M610,148 C720,140 760,210 794,290"/>
        <!-- 6. Lower → N5 (skips re-joining at N4) (starts x=715) -->

  // Crowd → question pulse: a small token travels from a random person to a new question bubble.
  const NS_SVG = 'http://www.w3.org/2000/svg';
  function firePulse(scene, bubbleEl) {
    if (reduceMotion()) return;
    const layer = scene.querySelector('.cv-link-layer'); if (!layer) return;
    const dots = scene.querySelectorAll('.cv-dot'); if (!dots.length) return;
    const lr = layer.getBoundingClientRect(); if (!lr.width) return;
    const dotEl = dots[Math.floor(Math.random() * dots.length)];
    const src = dotEl.getBoundingClientRect();
    const br = bubbleEl.getBoundingClientRect();
    const x1 = src.left + src.width / 2 - lr.left, y1 = src.top + src.height / 2 - lr.top;
    const x2 = br.left - lr.left + 6, y2 = br.top + br.height / 2 - lr.top;
    // Static guide line (plain SVG, no animation).
    const d = `M ${x1} ${y1} C ${(x1 + x2) / 2} ${y1}, ${(x1 + x2) / 2} ${y2}, ${x2} ${y2}`;
    const svg = document.createElementNS(NS_SVG, 'svg');
    svg.setAttribute('class', 'cv-pulse-svg'); svg.setAttribute('viewBox', `0 0 ${lr.width} ${lr.height}`); svg.setAttribute('preserveAspectRatio', 'none');
    const path = document.createElementNS(NS_SVG, 'path'); path.setAttribute('d', d); path.setAttribute('class', 'cv-pulse-line');
    svg.appendChild(path); layer.appendChild(svg);

    // Moving token + halo — driven by the Web Animations API. Sample the SAME cubic bezier
    // as the guide line above so the token rides exactly on the dashed line (no SMIL).
    const P = [[x1, y1], [(x1 + x2) / 2, y1], [(x1 + x2) / 2, y2], [x2, y2]];
    const frames = [];
    const STEPS_N = 24;
    for (let i = 0; i <= STEPS_N; i++) {
      const t = i / STEPS_N, u = 1 - t;
      const bx = u * u * u * P[0][0] + 3 * u * u * t * P[1][0] + 3 * u * t * t * P[2][0] + t * t * t * P[3][0];
      const by = u * u * u * P[0][1] + 3 * u * u * t * P[1][1] + 3 * u * t * t * P[2][1] + t * t * t * P[3][1];
      const op = t < 0.15 ? t / 0.15 : t > 0.85 ? (1 - t) / 0.15 : 1;
      frames.push({ transform: `translate(${bx.toFixed(1)}px, ${by.toFixed(1)}px)`, opacity: op, offset: t });
    }
    const opts = { duration: 1400, easing: 'linear', fill: 'forwards' };
    const halo = document.createElement('div'); halo.className = 'cv-pulse-halo'; layer.appendChild(halo);
    const tok = document.createElement('div'); tok.className = 'cv-pulse-token'; layer.appendChild(tok);
    if (halo.animate) { halo.animate(frames, opts); tok.animate(frames, opts); }

    dotEl.classList.add('asking');                  // the asker lights up cyan as the question flies
    const tm = scene._cvTimers || (scene._cvTimers = []);
    tm.push(setTimeout(() => dotEl.classList.remove('asking'), 1000));
    tm.push(setTimeout(() => { svg.style.opacity = '0'; }, 1500));
    tm.push(setTimeout(() => { svg.remove(); halo.remove(); tok.remove(); }, 2050));
  }

      b.style.maxWidth = (72 + Math.random() * 26).toFixed(0) + '%';        // slight width variation

        return;
      }
      const caret = document.createElement('span'); caret.className = 'cv-caret'; body.appendChild(caret);
      let ci = 0;
      const type = () => {
        txt.textContent = q.slice(0, ci++);
        if (ci <= q.length) { timers.push(setTimeout(type, 36)); }
        else {
          caret.remove(); addTick();
          timers.push(setTimeout(() => b.classList.add('answered'), 220));
          timers.push(setTimeout(addBubble, 1500));
        }
      };
      type();
    };
    timers.push(setTimeout(addBubble, 150));   // narration has already played; begin promptly
  }
  // Typewriter for a narration line. `segments` = [{t, hl?}] so part of a line can be coloured.
  function typeLine(scene, host, segments, cps, onDone) {
    host.innerHTML = '';
    const spans = segments.map(s => { const e = document.createElement('span'); if (s.hl) e.className = 'cv-hl'; host.appendChild(e); return e; });
    if (reduceMotion()) { spans.forEach((e, i) => e.textContent = segments[i].t); onDone && onDone(); return; }
    const caret = document.createElement('span'); caret.className = 'cv-caret'; host.appendChild(caret);
    let si = 0, ci = 0;
    const stepFn = () => {
      if (si >= segments.length) { caret.remove(); onDone && onDone(); return; }
      const seg = segments[si];
      if (ci < seg.t.length) spans[si].textContent += seg.t[ci++];
      else { si++; ci = 0; }
      scene._cvTimers.push(setTimeout(stepFn, cps));
    };
    stepFn();
  }

  function playConvo(el) {
    const scene = el.querySelector('.cv-scene'); if (!scene) return;
    if (scene._cvTimers) scene._cvTimers.forEach(clearTimeout);
    scene._cvTimers = [];
    stopConvoQuestions(scene);
    scene.classList.remove('playing', 'experts', 'revealed');
    const narrate = scene.querySelector('.cv-narrate');
    const rtitle = scene.querySelector('.cv-rtitle');
    narrate.classList.remove('wipe'); narrate.innerHTML = ''; rtitle.innerHTML = '';
    const layer = scene.querySelector('.cv-link-layer'); if (layer) layer.innerHTML = '';

    // Frame the two experts as a side-by-side pair at the panel centre. Reset --sx/--sy to 0
    // first so the measurement isn't thrown off by the previous play's offsets (replay fix).
    const heroes = scene.querySelectorAll('.cv-hero-ic');
    const people = scene.querySelector('.cv-people');
    heroes.forEach(h => { h.style.transition = 'none'; h.style.setProperty('--sx', '0px'); h.style.setProperty('--sy', '0px'); });
    void scene.offsetWidth;
    const pr = people.getBoundingClientRect();
    const cx = pr.left + pr.width / 2, cy = pr.top + pr.height * 0.58;
    heroes.forEach((h, k) => {
      const r = h.getBoundingClientRect();
      const off = (k === 0 ? -1 : 1) * r.width * 0.52;   // spacing scales with the (large) start size
      h.style.setProperty('--sx', (cx - (r.left + r.width / 2) + off) + 'px');
      h.style.setProperty('--sy', (cy - (r.top + r.height / 2)) + 'px');
    });
    void scene.offsetWidth;                              // commit placement before re-enabling transition
    heroes.forEach(h => { h.style.transition = ''; });

    scene.classList.add('playing');                      // blank stage
    const CPS = 67;                                       // ~40% slower typing
    const T = (fn, ms) => scene._cvTimers.push(setTimeout(fn, ms));

    // 1) "Everything you've just seen used to take experts." on the left; experts appear once it finishes.
    typeLine(scene, narrate, [{ t: "Everything you've just seen used to take " }, { t: 'experts', hl: true }, { t: '.' }], CPS, () => scene.classList.add('experts'));
    // 2) hold, then wipe the line away.
    T(() => narrate.classList.add('wipe'), 4800);
    // 3) experts shrink + crowd fades in while "Now anyone can get the answers they need." types
    //    on the left (and then stays there).
    T(() => {
      narrate.classList.remove('wipe'); narrate.innerHTML = '';
      scene.classList.add('revealed');
      typeLine(scene, narrate, [{ t: 'Now ' }, { t: 'anyone', hl: true }, { t: ' can get the answers they need.' }], CPS);
    }, 5650);
    // 4) after a small beat, the right-hand title types at the same height; the questions (and
    //    their pulses) wait until it has finished typing before they begin to stream in.
    T(() => typeLine(scene, rtitle, [{ t: 'Simply by asking, in their own words.' }], CPS,
      () => { if (scene._cvTimers) scene._cvTimers.push(setTimeout(() => startConvoQuestions(scene), 650)); }), 9300);
  }
  function stopConvo(el) {
    const scene = el.querySelector('.cv-scene'); if (!scene) return;
    if (scene._cvTimers) { scene._cvTimers.forEach(clearTimeout); scene._cvTimers = null; }
    stopConvoQuestions(scene);
    const narrate = scene.querySelector('.cv-narrate'); if (narrate) { narrate.classList.remove('wipe'); narrate.innerHTML = ''; }
    const rtitle = scene.querySelector('.cv-rtitle'); if (rtitle) rtitle.innerHTML = '';
    const layer = scene.querySelector('.cv-link-layer'); if (layer) layer.innerHTML = '';
    scene.classList.remove('playing', 'experts', 'revealed');
  }

  function showBig(n) {
    const next = (n >= 1 && n <= STEPS) ? bigs[n - 1] : null;
    if (next === currentBig) return;
    const prev = currentBig;
    currentBig = next;
    if (swapTimer) { clearTimeout(swapTimer); swapTimer = null; }
    if (prev) {
      prev.classList.remove('active'); prev.classList.add('closing');
      stopScene(prev);                                        // halt timers + reset the leaving card
    }
    const delay = prev ? 280 : 0;           // close the last card, then raise the new one
    swapTimer = setTimeout(() => {
      if (prev) prev.classList.remove('closing');
      if (next) {
        // A rapid back-and-forth can cancel a pending swap, stranding a stale
        // .closing (opacity 0) on this card — scrub it before re-activating.
        next.classList.remove('closing');
        next.classList.add('active');
        playScene(next);
      }
    }, delay);
  }

  // Replay the animation in the currently-open card (driven by the in-iframe replay
  // button and the deck's replay button via the 'replay' message).
  function replayCurrent() {
    const el = currentBig; if (!el) return;
    playScene(el);
  }

  function render() {
    // rail + pillar highlight
    railCards.forEach((c, i) => {
      c.classList.toggle('active', step === i + 1);
      c.classList.toggle('done', step > i + 1);
    });
    pillar.classList.toggle('active', step === STEPS);

    // big card
    showBig(step);
    const app = document.getElementById('app');
    app.classList.toggle('intro-mode', step === 0);
    app.classList.toggle('finale-mode', step === FINALE);
    app.classList.toggle('finale-go', step === FINALE);
    // reset any in-flight finale entry choreography
    clearFinaleTimers();
    caption.classList.remove('cap-hidden');
    capSub.style.opacity = '';
    railWrap.style.transform = ''; railWrap.style.transition = '';
    pillarWrap.style.transform = ''; pillarWrap.style.transition = '';

    // caption: set the title + sub text, then bounce eyebrow + title + sub together.
    // Step 0 poses the bridging question; steps 1+ carry the layer's claim
    // ("Process Mining: See how you actually run.") with the claim in accent blue.
    capTitle.innerHTML = step === 0
      ? 'How does <span class="hl">Apromore</span><br/>Process Intelligence <span class="hl">solve this?</span>'
      : step === FINALE
        ? '<span class="hl">Now you can.</span>'
        : ALL[step - 1].name + ': <span class="hl">' + ALL[step - 1].claim + '</span>';
    capSub.innerHTML = step === 0
      ? ''
      : step === FINALE
        ? 'See how you run. Size what\'s at stake. Fix it, test it, keep it fixed.'
        : ALL[step - 1].sub;
    const capEls = [capEyebrow, capTitle, capSub];
    capEls.forEach(el => el.classList.remove('cap-bounce'));
    void capTitle.offsetWidth;                 // single reflow to re-fire the animation
    capEls.forEach(el => el.classList.add('cap-bounce'));

    // progress
    dots.forEach((d, i) => { d.classList.toggle('on', step === i + 1); d.classList.toggle('done', step > i + 1); });
    progLabel.textContent = step === 0 ? 'Overview' : step === FINALE ? 'Together' : ALL[step - 1].name;
    navCount.textContent = step + ' / ' + FINALE;
    btnPrev.disabled = step === 0;
    btnNext.disabled = step === FINALE;

    // Report the step to the deck — drives the autoplay dwell lookup.
    if (embedded) toParent({ type: 'embed-step', step: step });
  }

  function goTo(n) {
    n = Math.max(0, Math.min(FINALE, n));
    if (n === step) return;
    const from = step;
    step = n;
    clearFinaleTimers();
    if (step === FINALE && from === STEPS && !REDUCED_MOTION) enterFinale();
    else render();
  }

  // ── Finale entry choreography (forward 7 → 8 only) ───────────────
  // The step-7 caption fades out, the stack slides down to its centred resting
  // place (FLIP: measure, switch layout, transform back, release), then the
  // closing caption fades in and the pulse travels the rail. Reverse entry
  // and reduced motion land on the finished frame instantly via render().
  const finaleTimers = [];
  const FT = (fn, ms) => finaleTimers.push(setTimeout(fn, ms));
  function clearFinaleTimers() { finaleTimers.forEach(clearTimeout); finaleTimers.length = 0; }
  const REDUCED_MOTION = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function slideFrom(el, dy) {
    el.style.transition = 'none';
    el.style.transform = 'translateY(' + dy + 'px)';
    void el.offsetWidth;
    el.style.transition = 'transform 0.7s cubic-bezier(0.22,1,0.36,1)';
    el.style.transform = '';
    FT(() => { el.style.transition = ''; }, 760);
  }

  function enterFinale() {
    const app = document.getElementById('app');
    // chrome bookkeeping: same end state render() would set for the finale
    railCards.forEach(c => { c.classList.remove('active'); c.classList.add('done'); });
    pillar.classList.remove('active');
    showBig(FINALE);                                  // closes the open card
    dots.forEach((d, i) => { d.classList.toggle('on', i === FINALE - 1); d.classList.toggle('done', i < FINALE - 1); });
    progLabel.textContent = 'Together';
    navCount.textContent = FINALE + ' / ' + FINALE;
    btnPrev.disabled = false;
    btnNext.disabled = true;
    if (embedded) toParent({ type: 'embed-step', step: FINALE });
    // 1) the previous frame's caption fades out (big card is closing meanwhile)
    caption.classList.add('cap-hidden');
    FT(() => {
      // 2) stage the question and the (hidden) sub while the caption is
      //    invisible, so the layout the stack slides into never reflows
      capTitle.innerHTML = '<span class="fin-q">Do you actually know how your business runs?</span>';
      capSub.innerHTML = 'See how you run. Size what\'s at stake. Fix it, test it, keep it fixed.';
      capSub.style.opacity = '0';                   // space reserved, revealed at the end
      capSub.classList.remove('cap-bounce');        // its filled animation would override the inline opacity
      const r1 = railWrap.getBoundingClientRect();
      const p1 = pillarWrap.getBoundingClientRect();
      app.classList.add('finale-mode');
      const r2 = railWrap.getBoundingClientRect();
      const p2 = pillarWrap.getBoundingClientRect();
      slideFrom(railWrap, r1.top - r2.top);
      slideFrom(pillarWrap, p1.top - p2.top);
      // 3) the deck's master question returns once the stack has settled
      FT(() => {
        caption.classList.remove('cap-hidden');
        capTitle.classList.remove('cap-bounce'); void capTitle.offsetWidth; capTitle.classList.add('cap-bounce');
        // 4) hold, then the question fades away
        FT(() => {
          const q = capTitle.querySelector('.fin-q'); if (q) q.classList.add('fin-out');
          // 5) the answer lands at full scale and the pulse travels the stack
          FT(() => {
            capTitle.innerHTML = '<span class="hl">Now you can.</span>';
            capTitle.classList.remove('cap-bounce'); void capTitle.offsetWidth; capTitle.classList.add('cap-bounce');
            app.classList.add('finale-go');
            // 6) the recap line follows a beat later
            FT(() => {
              capSub.style.opacity = '';
              capSub.classList.remove('cap-bounce'); void capSub.offsetWidth; capSub.classList.add('cap-bounce');
            }, 420);
          }, 460);
        }, 2300);
      }, 780);
    }, 430);
  }

  btnPrev.addEventListener('click', () => goTo(step - 1));
  btnNext.addEventListener('click', () => goTo(step + 1));
  btnReplay.addEventListener('click', replayCurrent);

  // ── Keyboard + deck bridge ─────────────────────────────────────
  // Embedded in the deck (foundation.html), this file OWNS its own step sequence. The deck
  // sends intent only — deck-enter / deck-advance / deck-reverse — and we reply deck-next /
  // deck-prev when stepping past the first/last step so the deck changes slides. Because the
  // step count lives here, layers can be added/removed without touching the deck.
  const embedded = window.parent !== window;
  const toParent = (msg) => { try { window.parent.postMessage(msg, '*'); } catch (err) {} };
  const isArrowKey = k => k === 'ArrowRight' || k === 'ArrowLeft' || k === 'ArrowDown' || k === 'ArrowUp';
  const isFwdKey   = k => k === 'ArrowRight' || k === 'ArrowDown';

  function stepForward()  { if (step < FINALE) goTo(step + 1); else if (embedded) toParent({ type: 'deck-next' }); }
  function stepBackward() { if (step > 0)     goTo(step - 1); else if (embedded) toParent({ type: 'deck-prev' }); }

  // Local arrow keys — used standalone, and when the iframe itself holds focus inside the deck.
  window.addEventListener('keydown', (e) => {
    if (!isArrowKey(e.key)) return;
    e.preventDefault();
    isFwdKey(e.key) ? stepForward() : stepBackward();
  });

  // Parent → iframe messages (the deck's embed handshake):
  window.addEventListener('message', (e) => {
    if (!e.data) return;
    switch (e.data.type) {
      // Entered the slide (fwd/reverse). Set the step and ALWAYS render so the title
      // bounces on entry too — goTo() would no-op if the step index is unchanged.
      case 'deck-enter':       step = (e.data.dir === 'rev') ? FINALE : 0; render(); break;
      case 'deck-advance':     stepForward();  break;
      case 'deck-reverse':     stepBackward(); break;
      case 'replay':           replayCurrent(); break;     // deck replay button
    }
  });

  // ── Boot ───────────────────────────────────────────────────────
  render();
  // Tell the deck we're ready so it can (re)send deck-enter if it navigated here before load.
  if (embedded) toParent({ type: 'embed-ready' });
})();
</script>
</body>
</html>
