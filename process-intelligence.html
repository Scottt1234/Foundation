<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Layers of Process Intelligence · Apromore</title>
  <link rel="stylesheet" href="tokens.css" />
  <style>
    /* ───────────────────────────────────────────────────────────────
       The Layers of Process Intelligence — arrow-key walkthrough.
       Single-file, no external JS libraries. Built on the Salesforce
       2026 token palette (tokens.css), matching the deck's dark slides
       and the process-reality.html interaction model.

       Six slim layer cards (Process Mining → Monitor) sit above a
       full-width Conversational Interface pillar that underpins them
       all. Arrow keys step through 7 focus states plus a closing frame
       that lights the whole stack; each focus state closes the previous
       large card and raises the next, each hosting its own
       self-contained animation scene.
       ─────────────────────────────────────────────────────────────── */
    html, body { margin: 0; }
    html { height: 100%; }
    body {
      height: 100%; overflow: hidden;
      /* Match the deck's .sd slide background — same gradient stack used on every dark slide. */
      background:
        radial-gradient(80% 60% at 82% -4%, rgba(20,86,220,0.42), transparent 60%),
        radial-gradient(70% 60% at 4% 104%, rgba(10,60,200,0.32), transparent 60%),
        linear-gradient(165deg, #04102f 0%, #061d52 60%, #0a3aa0 130%);
      background-attachment: fixed;
      font-family: var(--font-body); color: #fff;
    }
    .hl { color: var(--sf-blue-l); }

    /* ── App shell: top (caption + rail) / bottom (big card stage) ── */
    #app { position: fixed; inset: 0; display: flex; flex-direction: column; z-index: 1; }
    #top { flex: 0 0 auto; }
    #bottom { flex: 1 1 auto; position: relative; min-height: 0; padding: 4px 48px 84px; }

    /* ── Brand pill (hidden in embed mode — deck shows its own) ── */
    .brand {
      position: fixed; top: 26px; left: 30px; z-index: 8;
      display: inline-flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.94); border-radius: 40px; padding: 7px 15px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.35);
    }
    .brand .nm { font-size: 12px; font-weight: 700; color: #5B3BD0; }
    .brand .x  { font-size: 13px; color: var(--gray-500); }
    .brand img { display: block; }
    body.embed .brand { display: none; }
    /* In the deck, the parent supplies slide dots, counter and prev/next arrows, and the
       active rail card signals the current layer — so hide our duplicate bottom chrome. */
    body.embed #nav, body.embed #progress { display: none; }

    /* ── Caption stack — mirrors process-reality.html / deck slide-body ── */
    /* top padding matches process-reality.html's caption (56px) — the higher of the
       deck's two patterns (foundation slide-body sits lower at 68px) — so an embedded
       slide 6 lines up with the process-reality slide it follows. */
    #caption { padding: 56px 48px 0; max-width: 1080px; margin: 0 auto; width: 100%; }
    #cap-eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--sf-blue-l); margin-bottom: 10px;
    }
    #cap-title {
      font-family: var(--font-body);
      font-size: clamp(26px, 3vw, 38px); font-weight: 700; line-height: 1.15;
      letter-spacing: -0.025em; color: #fff; margin: 0 0 12px;
    }
    #cap-sub {
      font-size: 16px; line-height: 1.7; color: rgba(255,255,255,0.66);
      max-width: 920px; margin: 0; min-height: 24px;
      transition: opacity 0.35s ease;
    }
    /* Caption bounce on every step transition — eyebrow, title and sub animate together,
       matching process-reality.html (only the caption bounces; cards/content do not). */
    @keyframes piTitleIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
    .cap-bounce { animation: piTitleIn 0.7s cubic-bezier(0,0,0.2,1) both; }

    /* ── Layer rail ── */
    #rail-wrap { max-width: 1080px; margin: 22px auto 0; padding: 0 48px; }
    #rail { display: flex; gap: 14px; align-items: stretch; }
    .pi-card {
      --c: #8fb8ff;
      flex: 1 1 0; min-width: 0; position: relative; cursor: pointer; text-align: center;
      border: 1px solid rgba(143,184,255,0.55);
      border-top: 2px solid rgba(143,184,255,0.55);
      border-radius: 8px;
      background: rgba(143,184,255,0.12);
      padding: 10px 12px; opacity: 0.5;
      transition: opacity 0.35s ease, transform 0.2s ease,
                  border-color 0.2s ease, background 0.2s ease;
    }
    .pi-card .pi-num {
      font-family: var(--font-display); font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; color: var(--sf-blue-l); opacity: 0.55;
    }
    /* card title — white, centred; sized to keep "Recommendation" on a single line */
    .pi-card .pi-name { font-size: 15px; font-weight: 700; color: #fff; margin-top: 4px; line-height: 1.2; text-align: center; }
    .pi-card .pi-tag {
      display: inline-block; margin-top: 6px; font-size: 9px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 999px; padding: 2px 8px;
    }
    /* flow connector between cards */
    .pi-card:not(:last-child)::after {
      content: '\203A'; position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
      font-size: 18px; line-height: 1; font-weight: 400; color: rgba(255,255,255,0.35); z-index: 3;
    }
    .pi-card.active {
      opacity: 1; transform: translateY(-4px);
      border-color: rgba(143,184,255,0.95);
      border-top-color: rgba(143,184,255,1);
      background: rgba(143,184,255,0.28);
    }
    .pi-card.done { opacity: 0.78; }

    /* ── Conversational Interface pillar (the foundation) ── */
    #pillar-wrap { max-width: 1080px; margin: 16px auto 0; padding: 0 48px; position: relative; }
    /* little bracket showing it underpins the rail above */
    #pillar-wrap::before {
      content: ''; position: absolute; left: 48px; right: 48px; top: -9px; height: 8px;
      border: 1px solid rgba(255,255,255,0.14); border-bottom: none; border-radius: 6px 6px 0 0;
      opacity: 0.6;
    }
    #pillar {
      --c: #8fb8ff; cursor: pointer; position: relative;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      border: 1px solid rgba(143,184,255,0.55);
      border-top: 2px solid rgba(143,184,255,0.55);
      border-radius: 8px;
      background: rgba(143,184,255,0.12);
      padding: 9px 16px; opacity: 0.5;
      transition: opacity 0.35s ease, transform 0.2s ease,
                  border-color 0.2s ease, background 0.2s ease;
    }
    /* just the (centred, white) title — no number or tag */
    #pillar .pi-name { font-size: 16px; font-weight: 700; color: #fff; line-height: 1.2; text-align: center; }
    #pillar.active {
      opacity: 1; transform: translateY(-3px);
      border-color: rgba(143,184,255,0.95);
      border-top-color: rgba(143,184,255,1);
      background: rgba(143,184,255,0.28);
    }

    /* ── Big animation card ── styled like the deck's slide-8 cards (clean & simple):
       flat fill, 1px border, 2px electric-blue top accent, no resting shadow. The
       electric-blue accent contrasts with the cloud-blue process cards above. */
    .pi-big {
      --c: #8fb8ff; position: absolute; inset: 24px 48px 84px;
      max-width: 944px; margin: 0 auto; left: 0; right: 0;
      display: flex; flex-direction: column;
      border: 1px solid rgba(255,255,255,0.12);
      border-top: 2px solid rgba(6,106,254,0.42);
      border-radius: 8px; overflow: hidden;
      /* Shared card fill — deep navy, sourced from the Conversational Interface card so
         all six animation cards read as one family (the one hard rule of the brief).
         The .pi-big-stage carries no background of its own, so the navy fills
         edge-to-edge inside the card border. */
      background: #04102f;
      opacity: 0; transform: translateY(46px) scale(0.985); pointer-events: none;
      transition: opacity 0.5s cubic-bezier(0.2,0.8,0.2,1),
                  transform 0.6s cubic-bezier(0.2,0.8,0.2,1);
    }
    .pi-big.active { opacity: 1; transform: none; pointer-events: auto; }
    .pi-big.closing { opacity: 0; transform: translateY(34px) scale(0.99); }

    .pi-big-head { flex: 0 0 auto; display: flex; align-items: center; gap: 16px; padding: 18px 24px 14px; }
    .pi-big-num {
      font-family: var(--font-display); font-size: 22px; font-weight: 700;
      color: var(--c); letter-spacing: 0.04em; line-height: 1;
    }
    .pi-big-headtext { flex: 1 1 auto; min-width: 0; }
    .pi-big-name { font-size: 19px; font-weight: 700; color: #fff; line-height: 1.15; }
    .pi-big-desc { font-size: 13px; color: rgba(255,255,255,0.66); line-height: 1.5; margin-top: 4px; max-width: 760px; }
    .pi-big-tag {
      flex: 0 0 auto; align-self: flex-start; font-size: 9.5px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--c);
      border: 1px solid color-mix(in srgb, var(--c) 50%, transparent); border-radius: 999px; padding: 4px 11px;
    }

    /* animation slot fills the whole big card (no header/text) */
    .pi-big-stage {
      flex: 1 1 auto; min-height: 0; position: relative;
      margin: 12px; border-radius: 12px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Placeholder animation slot ── */
    .pi-slot {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px; text-align: center;
      border: 1.5px dashed color-mix(in srgb, var(--c) 40%, rgba(255,255,255,0.18));
      border-radius: 12px;
      background:
        radial-gradient(60% 80% at 50% 45%, color-mix(in srgb, var(--c) 12%, transparent), transparent 70%),
        rgba(255,255,255,0.015);
    }
    .pi-slot-ic {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--c); background: color-mix(in srgb, var(--c) 14%, transparent);
      border: 1px solid color-mix(in srgb, var(--c) 45%, transparent);
      animation: slotPulse 2.6s ease-in-out infinite;
    }
    @keyframes slotPulse {
      0%, 100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--c) 40%, transparent); }
      50%      { box-shadow: 0 0 0 12px transparent; }
    }

    /* ── Step 0 · chapter-break mode: the question alone, centered like a
       chapter page; rail and stage wait for the first advance ── */
    #app.intro-mode { justify-content: center; }
    #app.intro-mode #bottom { display: none; }
    #app.intro-mode #caption { text-align: center; padding-bottom: 10vh; }
    #app.intro-mode #cap-title { font-size: clamp(34px, 4.6vw, 58px); letter-spacing: -0.03em; line-height: 1.1; }
    #cap-title .hl { color: var(--sf-blue-l); }
    #app.intro-mode #cap-sub { margin-left: auto; margin-right: auto; }
    /* the question stands alone — no eyebrow, no sub */
    #app.intro-mode #cap-eyebrow, #app.intro-mode #cap-sub { display: none; }
    /* a breath before the chapter question lands — entry was too abrupt */
    #app.intro-mode .cap-bounce { animation-delay: 0.5s; }
    #app.intro-mode #rail-wrap, #app.intro-mode #pillar-wrap { display: none; }

    /* ── Final frame · the whole stack, lit ── answers the step-0 question.
       The stage closes, caption + rail + pillar centre in the freed space,
       and every card sits at full strength for the first time. One soft
       pulse travels the rail left to right (see it run, then ask), once. ── */
    #app.finale-mode { justify-content: center; }
    #app.finale-mode #bottom { display: none; }
    #app.finale-mode #caption { text-align: center; }
    #app.finale-mode #cap-title { font-size: clamp(30px, 4vw, 52px); letter-spacing: -0.03em; }
    #app.finale-mode #cap-sub { margin-left: auto; margin-right: auto; }
    #app.finale-mode #rail-wrap { margin-top: 36px; }
    #app.finale-mode #pillar-wrap { margin-bottom: 4vh; }
    #app.finale-mode .pi-card, #app.finale-mode #pillar { opacity: 1; transform: none; }
    @keyframes finPulse {
      0%   { box-shadow: 0 0 0 rgba(143,184,255,0); }
      40%  { box-shadow: 0 0 26px rgba(143,184,255,0.55); border-color: rgba(143,184,255,1); background: rgba(143,184,255,0.28); }
      100% { box-shadow: 0 0 0 rgba(143,184,255,0); }
    }
    /* the pulse waits for .finale-go (added once the slide-down has landed) */
    #app.finale-mode.finale-go .pi-card, #app.finale-mode.finale-go #pillar { animation: finPulse 1.05s ease both; }
    #app.finale-mode .pi-card:nth-child(1) { animation-delay: 0.15s; }
    #app.finale-mode .pi-card:nth-child(2) { animation-delay: 0.30s; }
    #app.finale-mode .pi-card:nth-child(3) { animation-delay: 0.45s; }
    #app.finale-mode .pi-card:nth-child(4) { animation-delay: 0.60s; }
    #app.finale-mode .pi-card:nth-child(5) { animation-delay: 0.75s; }
    #app.finale-mode .pi-card:nth-child(6) { animation-delay: 0.90s; }
    #app.finale-mode #pillar { animation-delay: 1.10s; }
    /* caption fade used by the finale entry choreography */
    #caption { transition: opacity 0.4s ease; }
    #caption.cap-hidden { opacity: 0; }
    /* the finale drops the eyebrow: the typed question carries the context */
    #app.finale-mode #cap-eyebrow { display: none; }
    /* the chapter question re-types in white at a smaller scale, then wipes;
       'Now you can.' answers at full chapter scale in blue */
    #cap-title .fin-q { font-size: clamp(20px, 2.4vw, 32px); display: inline-block; color: #fff; transition: opacity 0.4s ease; }
    #cap-title .fin-q.fin-out { opacity: 0; }
    @media (prefers-reduced-motion: reduce) {
      #app.finale-mode .pi-card, #app.finale-mode #pillar { animation: none !important; }
    }

    /* ── Bottom-left progress / bottom-right nav ── */
    #progress { position: fixed; left: 30px; bottom: 28px; z-index: 6; display: flex; align-items: center; gap: 14px; }
    #dots { display: flex; gap: 8px; }
    #dots .dot {
      width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.25);
      transition: background 0.3s ease, transform 0.3s ease;
    }
    #dots .dot.on { background: #8fb8ff; transform: scale(1.25); }
    #dots .dot.done { background: rgba(255,255,255,0.55); }
    #prog-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.5); }

    #nav { position: fixed; right: 30px; bottom: 24px; z-index: 6; display: flex; align-items: center; gap: 14px; }
    #nav .nav-count { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.55); font-variant-numeric: tabular-nums; }
    #nav button {
      appearance: none; cursor: pointer; width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.28); color: #fff;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease, opacity 0.18s ease;
    }
    #nav button:hover { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.5); }
    #nav button:active { transform: scale(0.94); }
    #nav button:disabled { opacity: 0.3; cursor: default; }

    /* ═══════════ Task Mining animation — the work between the systems ═══════════
       Reuses the Process Mining visual language (same System + Engine + map style)
       but overrides timings so the System and Engine are present from t=0 (carried
       over from the PM card visually). Three beats:
         Beat 1 (0–4.6s)    System + Engine appear; dots stream from System into
                            Engine. Caption: "Process mining can only see what your
                            systems log."
         Beat 2 (4.95–9.4s) Caption: "But the real work happens between them...";
                            extras (Browser/Email/Sheet/Doc) fade in 5.5s, their
                            activity pulses and dark connectors land during it.
         Beat 3 (9.75s+)    Connectors brighten + dots stream from extras (10.4s);
                            after a breath the map grows its new variants (13.5s)
                            — cause, then effect. */
    .tm-scene { position: absolute; inset: 0; overflow: hidden; }
    .tm-scene::before { content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(54% 62% at 57% 52%, rgba(20,86,220,0.20), transparent 70%); }

    /* TM-specific timings — reuses pm-* classes from the Process Mining card.
       System + Engine appear quickly at t=0 (carried over visually from PM). */
    .tm-scene.playing .pm-sys-box   { animation: pmSysIn 0.6s 0.0s cubic-bezier(.22,1,.36,1) both; }
    .tm-scene.playing .pm-sys-cyl,
    .tm-scene.playing .pm-sys-cyl-top { animation: pmFade 0.5s 0.3s ease both; }
    .tm-scene.playing .pm-sys-label { animation: pmFade 0.5s 0.5s ease both; }
    .tm-scene.playing .pm-rec       { animation: pmRow 0.45s ease both; }
    .tm-scene.playing .pm-rt        { animation: pmStream 1.4s ease-out infinite; }
    .tm-scene.playing .pm-eng       { animation: pmFade 0.6s 0.3s ease both; }
    .tm-scene.playing .pm-eng-halo  { animation: pmEngHalo 0.7s 0.7s ease forwards; }
    .tm-scene.playing .pm-eng-core  { animation: pmEngPulse 1.6s 0.7s ease-in-out infinite; }
    .tm-scene.playing .pm-eng-ring  { animation: pmEngRotate 14s 0.7s linear infinite; }
    .tm-scene.playing .pm-edge      { animation: pmDraw 0.45s ease both; }
    .tm-scene.playing .pm-node      { animation: pmNode 0.55s cubic-bezier(.22,1,.36,1) both; }
    .tm-scene.playing .pm-core      { animation: pmFade 0.45s ease both; }
    .tm-scene.playing .pm-label     { animation: pmFade 0.55s ease both; }

    /* The carry-over process map (System + Engine + spine + alt path + rework1)
       is visible from frame 1 — no animation. Elements that should appear
       statically are tagged with .tm-static; that class overrides the default
       animated state to make them visible immediately.
       The new Beat-3 variants (3 forward arcs + 1 upper node + 2 connecting
       edges) DON'T have .tm-static — they animate in at ~15.56s using the
       same .tm-scene.playing animations defined above (streams 10.4s →
       breath → variants 13.5s — cause, then effect, at human speed). */
    .tm-scene .pm-edge.tm-static { opacity: 0.92; stroke-dashoffset: 0; animation: none; }
    .tm-scene .pm-node.tm-static { opacity: 1; transform: none; animation: none; }
    .tm-scene .pm-core.tm-static { opacity: 1; animation: none; }

    /* ── TM extras (Beat 2): small panels around the System representing the
       non-logged tools — Browser, Email, Spreadsheet, Document. Reuse the same
       glass + cyan-stroke palette as the System/Engine so they read as members
       of the same family. ── */
    .tm-extra { opacity: 0; }
    .tm-extra-box { fill: rgba(143,184,255,0.10); stroke: rgba(143,184,255,0.55); stroke-width: 1.2; }
    .tm-win-dot { fill: rgba(143,184,255,0.45); }
    .tm-win-name { fill: rgba(255,255,255,0.66); font: 600 8.5px var(--font-body); letter-spacing: 0.03em; }
    .tm-ui-div { stroke: rgba(143,184,255,0.28); stroke-width: 1; }
    .tm-ui { fill: none; stroke: rgba(143,184,255,0.45); stroke-width: 1.1; stroke-linecap: round; stroke-linejoin: round; }
    .tm-ui-fill { fill: rgba(143,184,255,0.16); }
    .tm-ui-dot { fill: rgba(143,184,255,0.4); }
    .tm-scene.playing .tm-extra { animation: pmFade 0.55s ease forwards; }
    /* Beat 2: the extras are visibly ACTIVE — content lines pulse like live work —
       but nothing flows out of them. Their connections to the engine exist, dark
       and empty (tmConnIn), until task mining switches on in Beat 3 (tmConnLive). */
    .tm-act { fill: rgba(143,184,255,0.6); opacity: 0; }
    .tm-scene.playing .tm-act { animation: tmActPulse 1.7s ease-in-out infinite; }
    @keyframes tmActPulse { 0%, 100% { opacity: 0.18; } 50% { opacity: 0.85; } }
    .tm-conn { stroke: #8fb8ff; stroke-width: 1.3; stroke-dasharray: 4 7; opacity: 0; }
    .tm-scene.playing .tm-conn { animation: tmConnIn 0.6s ease both, tmConnLive 0.9s ease forwards; }
    @keyframes tmConnIn  { from { opacity: 0; } to { opacity: 0.22; } }
    @keyframes tmConnLive { to { opacity: 0.6; } }

    @media (prefers-reduced-motion: reduce) {
      .tm-scene .pm-sys-box, .tm-scene .pm-sys-cyl, .tm-scene .pm-sys-cyl-top, .tm-scene .pm-sys-label,
      .tm-scene .pm-rec, .tm-scene .pm-core, .tm-scene .pm-label, .tm-scene .pm-bottle-glow, .tm-scene .pm-alt-glow,
      .tm-scene .pm-eng, .tm-scene .pm-eng-halo, .tm-scene .tm-extra
        { opacity: 1 !important; animation: none !important; }
      .tm-scene .pm-rt    { opacity: 0 !important; animation: none !important; }
      .tm-scene .tm-act   { opacity: 0.7 !important; animation: none !important; }
      .tm-scene .tm-conn  { opacity: 0.55 !important; animation: none !important; }
      .tm-scene .pm-rec   { transform: scaleX(1) !important; animation: none !important; }
      .tm-scene .pm-edge  { opacity: 0.92 !important; stroke-dashoffset: 0 !important; animation: none !important; }
      .tm-scene .pm-node  { opacity: 1 !important; transform: none !important; animation: none !important; }
      .tm-scene .pm-node--bottle, .tm-scene .pm-node--alt { stroke: #ffb24d !important; }
      .tm-scene .pm-bottle-ring, .tm-scene .pm-alt-ring   { opacity: 0.7 !important; animation: none !important; }
      .tm-scene .pm-eng-core, .tm-scene .pm-eng-ring      { animation: none !important; transform: none !important; }
    }

    /* ═══════════ Conversational Interface animation — the few → the many ═══════════
       Narrated: "Everything you've just seen used to take experts." → two experts → they shrink into an organic
       whole-org crowd as "Now anyone can ask." types; then "In their own words." + questions. */
    .cv-scene { position: absolute; inset: 0; display: flex; }
    /* same soft radial atmosphere the other cards carry over the navy fill */
    .cv-scene::before { content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(52% 60% at 50% 52%, rgba(20,86,220,0.18), transparent 70%); }
    .cv-people { position: relative; flex: 1.7 1 0; overflow: hidden; }
    /* soft cloud-blue glow behind the crowd (atmosphere / depth) */
    .cv-people::before { content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(46% 52% at 50% 62%, rgba(0,179,255,0.14), transparent 72%);
      opacity: 0; transition: opacity 1.4s ease; }
    .cv-scene.revealed .cv-people::before { opacity: 1; }
    .cv-questions { position: relative; flex: 1.2 1 0; min-width: 0; display: flex; flex-direction: column;
      justify-content: flex-start; padding: 26px 16px 16px; }
    /* softened divider — a gradient hairline that fades at top & bottom */
    .cv-questions::before { content: ''; position: absolute; left: 0; top: 9%; bottom: 9%; width: 1px; pointer-events: none;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.16) 22%, rgba(255,255,255,0.16) 78%, transparent); }
    .cv-qlist { display: flex; flex-direction: column; justify-content: flex-start; gap: 9px; }

    /* typed narration lines — left (cv-narrate) and right (cv-rtitle), same font + size */
    .cv-narrate, .cv-rtitle { font-family: var(--font-display); font-weight: 700;
      font-size: clamp(15px, 2.2vw, 20px); letter-spacing: -0.01em; line-height: 1.25; color: #fff; }
    .cv-narrate { position: absolute; top: 26px; left: 6%; right: 6%; white-space: nowrap; }   /* top matches the right title (cv-questions padding-top) */
    .cv-narrate.wipe { clip-path: inset(0 0 0 0); animation: cvWipe 0.77s ease forwards; }
    .cv-rtitle { color: var(--sf-blue-l); margin: 0 0 14px; white-space: nowrap; }   /* one line, top at 26px → same height as the left narration */
    .cv-hl { color: var(--sf-blue-l); }
    .cv-caret { display: inline-block; width: 2px; height: 1em; background: var(--sf-blue-l);
      margin-left: 2px; vertical-align: -2px; animation: cvBlink 1s step-end infinite; }

    /* expert "spotlight" — a soft pool of light under the two experts during act 1 */
    .cv-spotlight { position: absolute; left: 50%; top: 86%; width: 52%; height: 15%; transform: translate(-50%,-50%);
      background: radial-gradient(50% 50% at 50% 50%, rgba(0,179,255,0.32), transparent 70%);
      filter: blur(7px); opacity: 0; transition: opacity 0.9s ease; pointer-events: none; z-index: 0; }
    .cv-scene.experts .cv-spotlight { opacity: 1; }
    .cv-scene.revealed .cv-spotlight { opacity: 0; transition: opacity 0.8s ease; }

    /* crowd cloud (organic, absolute positions + per-person depth set inline) */
    .cv-crowd { position: absolute; inset: 22% 3% 6% 3%; }
    /* constellation — faint links between near neighbours, behind the people */
    .cv-net { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; opacity: 0; transition: opacity 1.6s ease; }
    .cv-scene.revealed .cv-net { opacity: 1; }
    .cv-net line { stroke: rgba(143,184,255,0.13); stroke-width: 1; vector-effect: non-scaling-stroke; }
    .cv-dot, .cv-hero-ic { position: absolute; width: 9.6%; aspect-ratio: 1; transform: translate(-50%,-50%); }
    .cv-dot svg, .cv-hero-ic svg { width: 100%; height: 100%; display: block; fill: currentColor; }
    .cv-dot { color: #cdd6e1; opacity: 0; z-index: 1; transition: color 0.5s ease, filter 0.5s ease; }   /* the wider org — slightly grey; size/brightness/depth set inline */
    .cv-dot.asking { color: #ffffff !important; filter: drop-shadow(0 0 9px rgba(255,255,255,0.95)); z-index: 11; }   /* lights up white as it "asks" (kept distinct from the blue experts) */
    .cv-dot svg { animation: cvFloat 3s ease-in-out infinite; animation-delay: calc(var(--d,0) * 1s); }
    .cv-scene.revealed .cv-dot { animation: cvFade 1.1s calc(var(--i,0) * 0.05s) ease forwards; }   /* slow fade-in */

    /* the two experts — appear large & centred (.experts), then slowly fly in & shrink (.revealed) */
    .cv-hero-ic { --amp: 10px; color: var(--sf-blue-l); opacity: 0; z-index: 12;
      filter: drop-shadow(0 0 12px rgba(0,179,255,0.6));
      transform: translate(-50%,-50%) translate(var(--sx,0), var(--sy,0)) scale(var(--hs,4.2));
      transition: transform 2.5s cubic-bezier(0.4,0,0.2,1), opacity 0.9s ease; }
    .cv-scene.experts .cv-hero-ic { opacity: 1; }
    .cv-scene.revealed .cv-hero-ic { transform: translate(-50%,-50%) scale(1); }
    .cv-scene.revealed .cv-hero-ic svg { animation: cvFloat 3s ease-in-out infinite; }

    /* crowd → question pulses (a token travels from a person to each new question) */
    .cv-link-layer { position: absolute; inset: 0; pointer-events: none; z-index: 6; }
    .cv-pulse-svg { position: absolute; inset: 0; width: 100%; height: 100%; transition: opacity 0.45s ease; }
    .cv-pulse-line  { fill: none; stroke: rgba(143,184,255,0.45); stroke-width: 1.3; stroke-dasharray: 3 4; vector-effect: non-scaling-stroke; }
    .cv-pulse-token { position: absolute; left: 0; top: 0; width: 10px; height: 10px; margin: -5px 0 0 -5px;
      border-radius: 50%; background: #eaf6ff; box-shadow: 0 0 9px 2px rgba(0,179,255,0.95); }
    .cv-pulse-halo  { position: absolute; left: 0; top: 0; width: 22px; height: 22px; margin: -11px 0 0 -11px;
      border-radius: 50%; background: radial-gradient(circle, rgba(0,179,255,0.38), transparent 70%); }

    /* question bubbles (one size larger) — each with a small "asker" avatar */
    /* question bubbles wear the ask-bar pill style: navy fill, blue border, chat glyph */
    .cv-q { position: relative; align-self: flex-start; max-width: 100%;
      display: flex; align-items: flex-start; gap: 10px;
      background: rgba(10,28,68,0.85); border: 1px solid rgba(143,184,255,0.55);
      border-radius: 999px; padding: 10px 18px 10px 15px; font-size: 13.5px; line-height: 1.4;
      color: #fff; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      animation: cvQIn 0.4s cubic-bezier(0.22,1,0.36,1) both; }
    .cv-q-av { flex: 0 0 auto; width: 18px; height: 18px; margin-top: 1px;
      display: flex; align-items: center; justify-content: center; color: #8fb8ff; }
    .cv-q-av svg { width: 16px; height: 16px; display: block; fill: none; stroke: currentColor; stroke-width: 1.6; stroke-linejoin: round; }
    .cv-q-av.expert { color: var(--sf-blue-l); }
    .cv-q-body { flex: 1 1 auto; min-width: 0; }
    .cv-q .cv-tick { display: inline-block; margin-left: 6px; color: #04E1CB; font-weight: 700; opacity: 0; transition: opacity 0.3s ease; }
    .cv-q.answered .cv-tick { opacity: 1; }

    @keyframes cvFloat {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(calc(var(--amp,8px) * 0.16), calc(var(--amp,8px) * -0.55)); }
      50% { transform: translate(0, calc(var(--amp,8px) * -1)); }
      75% { transform: translate(calc(var(--amp,8px) * -0.16), calc(var(--amp,8px) * -0.45)); }
    }
    @keyframes cvFade  { from { opacity: 0; transform: translate(-50%,-50%) scale(0.7); } to { opacity: 1; transform: translate(-50%,-50%) scale(1); } }
    @keyframes cvWipe  { from { clip-path: inset(0 0 0 0); } to { clip-path: inset(0 0 0 100%); } }
    @keyframes cvQIn   { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    @keyframes cvBlink { 50% { opacity: 0; } }

    @media (prefers-reduced-motion: reduce) {
      .cv-scene .cv-dot { opacity: 1 !important; transform: translate(-50%,-50%) !important; animation: none !important; }
      .cv-scene .cv-dot svg { animation: none !important; }
      .cv-scene .cv-hero-ic { opacity: 1 !important; transform: translate(-50%,-50%) scale(1) !important; transition: none !important; }
      .cv-narrate.wipe { animation: none !important; }
    }

    /* ═══════════ Process Mining animation — data → the real process map ═══════════
       Self-contained: a single source system streams its event log; the records
       assemble into a clean process flow, which then reveals its real variation —
       an alternative path, a rework loop and a bottleneck. Everything originates
       from the one system, keeping the scene scoped to a single source. All drawn
       in one SVG so panel, engine, graph and labels share a coordinate space. Scoped
       under .pm-scene; uses the shared pi-cardscene shell + pi-narr narration so it
       matches cards 3–6. Three beats:
         Beat 1 (0–3s)   Extract: database appears, ~24 glowing dots stream toward the
                         compiling-engine icon in the middle.
         Beat 2 (3–6s)   Compile: engine activates (halo flares, ring rotates, core
                         pulses); ordered tokens emerge from its right edge; the main
                         spine builds progressively as those tokens land.
         Beat 3 (6–9s)   Map:     all variants (alt path, rework, bottleneck flare,
                         labels) appear in a tight ~0.5s window, not staggered. */

    /* ── source system panel (the database that originates the data) ── */
    .pm-sys-box   { fill: rgba(143,184,255,0.10); stroke: rgba(143,184,255,0.55); stroke-width: 1.3;
      opacity: 0; transform-box: fill-box; transform-origin: center; transform: scale(0.96); }
    .pm-sys-cyl   { fill: none; stroke: #8fb8ff; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round;
      opacity: 0; }
    .pm-sys-cyl-top { fill: rgba(143,184,255,0.22); stroke: #8fb8ff; stroke-width: 1.5; opacity: 0; }
    .pm-sys-label { fill: rgba(255,255,255,0.92); font: 700 13px var(--font-body); letter-spacing: 0.04em; opacity: 0; }
    .pm-rec       { fill: rgba(143,184,255,0.55); rx: 2; opacity: 0;
      transform-box: fill-box; transform-origin: left center; transform: scaleX(0);
      filter: drop-shadow(0 0 2px rgba(143,184,255,0.35)); }

    /* ── compiling engine (Apromore-inspired): central core + 4 orbiting nodes
       connected by curved arcs into an "orbit ring". The ring rotates slowly while
       active; the core pulses; the halo brightens when the stream first arrives. ── */
    .pm-eng       { opacity: 0; }
    .pm-eng-halo  { fill: rgba(0,179,255,0.06); }
    .pm-eng-arc   { fill: none; stroke: rgba(143,184,255,0.55); stroke-width: 2; opacity: 0.75; }
    .pm-eng-orb   { filter: drop-shadow(0 0 6px rgba(143,184,255,0.7)); }
    .pm-eng-orb-1 { fill: #00B3FF; }   /* top — bright cyan */
    .pm-eng-orb-2 { fill: #04E1CB; }   /* right — teal accent */
    .pm-eng-orb-3 { fill: #8fb8ff; }   /* bottom — cloud blue */
    .pm-eng-orb-4 { fill: #6f9bff; }   /* left — deeper cloud */
    .pm-eng-core  { fill: #e6f1ff; filter: drop-shadow(0 0 10px rgba(0,179,255,0.85));
      transform-box: fill-box; transform-origin: center; }
    .pm-eng-ring  { transform-box: fill-box; transform-origin: center; }

    /* ── streaming dots (Beat 1 → Beat 2): glowing circles flowing from system to
       engine. Volume is the point — many of them. ── */
    .pm-rt { fill: #e6f1ff; opacity: 0; filter: drop-shadow(0 0 4px rgba(143,184,255,0.95)); }

    /* ── ordered output tokens (Beat 2): emerge from engine right edge to node
       positions; brighter and slightly larger than the chaotic input stream ── */
    .pm-out { fill: #c5e9ff; opacity: 0; filter: drop-shadow(0 0 6px rgba(0,179,255,1)); }

    /* ── process map nodes + cores ── */
    .pm-node { fill: #0a1c44; stroke: #8fb8ff; stroke-width: 2.4; opacity: 0;
      transform-box: fill-box; transform-origin: center; transform: scale(0.2);
      filter: drop-shadow(0 0 6px rgba(143,184,255,0.40)); }
    .pm-core { fill: #bcd4ff; opacity: 0; }

    /* ── edges (forward / alternative / rework) ── */
    .pm-edge { fill: none; stroke: #6f9bff; stroke-width: 2.6; stroke-linecap: round;
      stroke-dasharray: 1 1; stroke-dashoffset: 1; opacity: 0;
      filter: drop-shadow(0 0 3px rgba(111,155,255,0.45)); }
    .pm-edge--alt    { stroke: #7aa0ff; stroke-width: 2.2; }
    .pm-edge--rework { stroke: #7aa0ff; stroke-width: 2.2; }

    /* ── live tokens riding the spine (Beat 2 onward) ── */
    .pm-tok { fill: #e6f1ff; opacity: 0; filter: drop-shadow(0 0 5px rgba(143,184,255,0.95)); }

    /* ── bottleneck flare + alt-node flare (Beat 3) — both flash amber together ── */
    .pm-bottle-glow, .pm-alt-glow { fill: rgba(255,160,60,0.18); opacity: 0; }
    .pm-bottle-ring, .pm-alt-ring { fill: none; stroke: #ffb24d; stroke-width: 2.2; opacity: 0;
      transform-box: fill-box; transform-origin: center; }

    /* ── feature labels ── */
    .pm-label { fill: rgba(255,255,255,0.78); font: 700 12px var(--font-body); letter-spacing: 0.03em; opacity: 0; }
    .pm-label--rework { fill: #ffce93; }
    .pm-label--bottle { fill: #ffce93; }

    /* ── timeline (fires when .playing is added; per-element delays live inline) ──
       Visuals overlap the captions (same rule as cards 4–6).
         Beat 1 (0–4.3s):    caption 0.35–2.65 · system 0.8–2.0 · dots flow from 2.4
         Beat 2 (4.65–8.4s): caption 4.65–7.4 · engine 5.1, spinning from 5.7
         Beat 3 (8.75s+):    caption 8.75–11.6 · map builds 9.2–11.8 · flares 12.2 · labels 12.7–13.3
       Streaming dots loop infinitely (data is always coming in) but their
       infinite cycle is offset so they only become visible from t=4.3s. */
    .pm-scene.playing .pm-sys-box   { animation: pmSysIn 0.6s 0.8s cubic-bezier(.22,1,.36,1) both; }
    .pm-scene.playing .pm-sys-cyl,
    .pm-scene.playing .pm-sys-cyl-top { animation: pmFade 0.5s 1.1s ease both; }
    .pm-scene.playing .pm-sys-label { animation: pmFade 0.5s 1.3s ease both; }
    .pm-scene.playing .pm-rec       { animation: pmRow 0.45s ease both; }
    .pm-scene.playing .pm-rt        { animation: pmStream 1.4s ease-out infinite; }
    .pm-scene.playing .pm-out       { animation: pmStream 0.6s ease-out both; }
    .pm-scene.playing .pm-eng       { animation: pmFade 0.6s 5.1s ease both; }
    .pm-scene.playing .pm-eng-halo  { animation: pmEngHalo 0.7s 5.7s ease forwards; }
    .pm-scene.playing .pm-eng-core  { animation: pmEngPulse 1.6s 5.7s ease-in-out infinite; }
    .pm-scene.playing .pm-eng-ring  { animation: pmEngRotate 14s 5.7s linear infinite; }
    .pm-scene.playing .pm-node      { animation: pmNode 0.55s cubic-bezier(.22,1,.36,1) both; }
    .pm-scene.playing .pm-core      { animation: pmFade 0.45s ease both; }
    .pm-scene.playing .pm-edge      { animation: pmDraw 0.45s ease both; }
    .pm-scene.playing .pm-tok       { animation: pmFade 0.6s ease forwards, pmTokFlow 3.4s linear infinite; }
    .pm-scene.playing .pm-label     { animation: pmFade 0.55s ease both; }
    .pm-scene.playing .pm-bottle-glow,
    .pm-scene.playing .pm-alt-glow    { animation: pmFade 0.7s 12.2s ease forwards; }
    .pm-scene.playing .pm-bottle-ring,
    .pm-scene.playing .pm-alt-ring    { animation: pmRingIn 0.5s 12.2s ease forwards, pmRingPulse 2.4s 12.7s ease-in-out infinite; }
    /* Beat 3 spine build runs from 12.9s; bottleneck and alt nodes both pop at
       14.2s (endpoints of the lines growing out of N2). Both warm to amber at
       15.9s once the spine has fully drawn. */
    .pm-scene.playing .pm-node--bottle { animation: pmNode 0.55s 10.5s cubic-bezier(.22,1,.36,1) both, pmWarm 0.8s 12.2s ease forwards; }
    .pm-scene.playing .pm-node--alt    { animation: pmNode 0.55s 10.5s cubic-bezier(.22,1,.36,1) both, pmWarm 0.8s 12.2s ease forwards; }

    @keyframes pmSysIn   { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    @keyframes pmFade    { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pmRow     { 0% { opacity: 0; transform: scaleX(0); } 50% { opacity: 1; } 100% { opacity: 1; transform: scaleX(1); } }
    @keyframes pmStream  { 0% { opacity: 0; transform: translate(0, 0); } 14% { opacity: 1; } 80% { opacity: 0.85; } 100% { opacity: 0; transform: translate(var(--tx, 100px), var(--ty, 0px)); } }
    @keyframes pmDraw    { 0% { opacity: 1; stroke-dashoffset: 1; } 100% { opacity: 0.92; stroke-dashoffset: 0; } }
    @keyframes pmNode    { 0% { opacity: 0; transform: scale(0.2); } 60% { opacity: 1; transform: scale(1.12); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes pmTokFlow { 0% { transform: translate(0, 0); } 100% { transform: translate(var(--tflow, 480px), 0); } }
    @keyframes pmEngHalo  { to { fill: rgba(0,179,255,0.22); } }
    @keyframes pmEngPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.25); } }
    @keyframes pmEngRotate { to { transform: rotate(360deg); } }
    @keyframes pmWarm    { to { stroke: #ffb24d; } }
    @keyframes pmRingIn  { from { opacity: 0; } to { opacity: 0.8; } }
    @keyframes pmRingPulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.32); opacity: 0.18; } }

    @media (prefers-reduced-motion: reduce) {
      .pm-scene .pm-sys-box, .pm-scene .pm-sys-cyl, .pm-scene .pm-sys-cyl-top, .pm-scene .pm-sys-label,
      .pm-scene .pm-rec, .pm-scene .pm-core, .pm-scene .pm-label, .pm-scene .pm-bottle-glow, .pm-scene .pm-alt-glow, .pm-scene .pm-tok,
      .pm-scene .pm-eng, .pm-scene .pm-eng-halo
        { opacity: 1 !important; animation: none !important; }
      .pm-scene .pm-rt, .pm-scene .pm-out { opacity: 0 !important; animation: none !important; }
      .pm-scene .pm-rec  { transform: scaleX(1) !important; animation: none !important; }
      .pm-scene .pm-edge { opacity: 0.92 !important; stroke-dashoffset: 0 !important; animation: none !important; }
      .pm-scene .pm-node { opacity: 1 !important; transform: none !important; animation: none !important; }
      .pm-scene .pm-node--bottle, .pm-scene .pm-node--alt { stroke: #ffb24d !important; }
      .pm-scene .pm-bottle-ring, .pm-scene .pm-alt-ring  { opacity: 0.7 !important; animation: none !important; }
      .pm-scene .pm-eng-core, .pm-scene .pm-eng-ring { animation: none !important; transform: none !important; }
    }

    /* ═══════════ Shared scaffolding for cards 3–6 ═══════════
       A common scene shell (navy glow + full-bleed SVG) and one typed-narration
       treatment, so every remaining card matches cards 1–2 and the conversational
       card without re-declaring the basics. Each card layers its own classes on top. */
    .pi-cardscene { position: absolute; inset: 0; overflow: hidden; }
    .pi-cardscene::before { content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(52% 60% at 50% 52%, rgba(20,86,220,0.18), transparent 70%); }
    .pi-cardsvg { position: relative; width: 100%; height: 100%; display: block; }
    .pi-narr { position: absolute; top: 20px; left: 28px; right: 28px; z-index: 4;
      font-family: var(--font-display); font-weight: 700; font-size: clamp(15px, 2.1vw, 20px);
      letter-spacing: -0.01em; line-height: 1.25; color: #fff; white-space: nowrap; pointer-events: none; }
    .pi-narr.wipe { animation: piNarrWipe 0.6s ease forwards; }
    .pi-hl { color: var(--sf-blue-l); }
    .pi-caret { display: inline-block; width: 2px; height: 1em; background: var(--sf-blue-l);
      margin-left: 2px; vertical-align: -2px; animation: piNarrBlink 1s step-end infinite; }
    @keyframes piNarrBlink { 50% { opacity: 0; } }
    @keyframes piNarrWipe { from { clip-path: inset(0 0 0 0); } to { clip-path: inset(0 0 0 100%); } }
    @keyframes piFade { from { opacity: 0; } to { opacity: 1; } }

    /* ═══════════ Analysis — scan the carried-over map, then quantify into pills ═══════════
       Layout: process map (TM final state) is carried over UNCHANGED on the right; the
       left third (where System+Engine+Extras lived in PM/TM) is now occupied by three
       large pills — Cost / Time / Resource. Beat 1 sweeps a scan line across the map.
       Beat 2 introduces the pills and runs their figures up as the caption types —
       "quantified" means numbers on screen, not placeholders.
       Beat 3 is purely spatial: the lead cost dot flares and the rest pulse — the
       map answers "where". */

    /* ── carry-over map (TM final state, visible from frame 1, no animation) ── */
    .an-map-edge { fill: none; stroke: #6f9bff; stroke-width: 2.6; stroke-linecap: round; opacity: 0.92;
      filter: drop-shadow(0 0 3px rgba(111,155,255,0.45)); }
    .an-map-edge--alt    { stroke: #7aa0ff; stroke-width: 2.2; }
    .an-map-edge--rework { stroke: #7aa0ff; stroke-width: 2.2; }
    .an-map-node { fill: #0a1c44; stroke: #8fb8ff; stroke-width: 2.4;
      filter: drop-shadow(0 0 6px rgba(143,184,255,0.40)); }
    .an-map-core { fill: #bcd4ff; }

    /* ── scan line + trail (Beat 1): sweeps L→R once. The trail is a horizontal gradient
       behind the leading bright line; together they read as a radar pass. ── */
    .an-scanwrap { transform: translateX(-280px); opacity: 0; }
    .an-scanline { stroke: #e6f1ff; stroke-width: 2.5; filter: drop-shadow(0 0 9px rgba(180,220,255,0.95)); }
    /* Linear sweep so the per-dot reveal delays (computed from x in buildAnalysis)
       match the bright line's actual position over time. Starts after Beat 1 caption finishes. */
    .an-scene.playing .an-scanwrap { animation: anScanSweep 2.6s 2.0s linear forwards; }
    @keyframes anScanSweep {
      0%   { transform: translateX(-280px); opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { transform: translateX(1280px); opacity: 0; }
    }

    /* ── scattered metric dots (Beat 2). Per-dot delay set inline. ── */
    .an-dot { opacity: 0; transform-box: fill-box; transform-origin: center; transform: scale(0.2); }
    .an-scene.playing .an-dot { animation: anDotIn 0.55s cubic-bezier(.22,1,.36,1) both; }
    @keyframes anDotIn { 0% { opacity: 0; transform: scale(0.2); } 60% { opacity: 1; transform: scale(1.25); } 100% { opacity: 0.85; transform: scale(1); } }
    .an-dot--cost     { fill: #ff9a6a; filter: drop-shadow(0 0 5px rgba(255,154,106,0.85)); }
    .an-dot--time     { fill: #8fb8ff; filter: drop-shadow(0 0 5px rgba(143,184,255,0.85)); }
    .an-dot--resource { fill: #5fe3a0; filter: drop-shadow(0 0 5px rgba(95,227,160,0.75)); }

    /* ── lead cost dot flare (Beat 3, dramatic): big amber glow + expanding ring ── */
    .an-flare-glow { fill: rgba(255,154,106,0.20); opacity: 0; transform-box: fill-box; transform-origin: center; }
    .an-flare-ring { fill: none; stroke: #ff9a6a; stroke-width: 2.4; opacity: 0; transform-box: fill-box; transform-origin: center;
      filter: drop-shadow(0 0 8px rgba(255,154,106,0.85)); }
    .an-scene.playing .an-flare-glow { animation: anFlareGlowIn 0.9s 9.5s ease forwards, anFlareGlowPulse 2.6s 10.4s ease-in-out infinite; }
    .an-scene.playing .an-flare-ring { animation: anFlareRingIn 0.7s 9.5s ease forwards, anFlareRingPulse 2.4s 10.2s ease-in-out infinite; }
    @keyframes anFlareGlowIn    { to { opacity: 1; } }
    @keyframes anFlareGlowPulse { 0%,100% { opacity: 0.85; } 50% { opacity: 1; } }
    @keyframes anFlareRingIn    { from { opacity: 0; transform: scale(0.5); } to { opacity: 0.95; transform: scale(1); } }
    @keyframes anFlareRingPulse { 0%,100% { transform: scale(1); opacity: 0.95; } 50% { transform: scale(1.55); opacity: 0.18; } }

    /* ── softer pulses on representative cost / time / resource dots (Beat 3) ──
       Single combined animation so per-dot staggering is just one inline animation-delay. */
    .an-pulse { fill: none; stroke-width: 1.7; opacity: 0; transform-box: fill-box; transform-origin: center; }
    .an-pulse--cost     { stroke: #ff9a6a; filter: drop-shadow(0 0 6px rgba(255,154,106,0.65)); }
    .an-pulse--time     { stroke: #8fb8ff; filter: drop-shadow(0 0 6px rgba(143,184,255,0.7)); }
    .an-pulse--resource { stroke: #5fe3a0; filter: drop-shadow(0 0 6px rgba(95,227,160,0.65)); }
    .an-scene.playing .an-pulse { animation: anPulseFull 3.0s ease-in-out infinite both; }
    @keyframes anPulseFull {
      0%   { opacity: 0;    transform: scale(0.55); }
      10%  { opacity: 0.85; transform: scale(1);    }
      50%  { opacity: 0.15; transform: scale(1.45); }
      100% { opacity: 0.85; transform: scale(1);    }
    }

    /* ── pills (large, wide, on the LEFT) ── */
    .an-pill { opacity: 0; }
    .an-scene.playing .an-pill { animation: anPillIn 0.6s cubic-bezier(.22,1,.36,1) both; }
    @keyframes anPillIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .an-pill-bg            { fill: rgba(143,184,255,0.06); stroke: rgba(143,184,255,0.32); stroke-width: 1; }
    .an-pill-bg--cost      { fill: rgba(255,154,106,0.05); stroke: rgba(255,154,106,0.42); }
    .an-pill-dot--cost     { fill: #ff9a6a; filter: drop-shadow(0 0 6px rgba(255,154,106,0.9)); }
    .an-pill-dot--time     { fill: #8fb8ff; filter: drop-shadow(0 0 6px rgba(143,184,255,0.9)); }
    .an-pill-dot--resource { fill: #5fe3a0; filter: drop-shadow(0 0 6px rgba(95,227,160,0.85)); }
    .an-pill-label         { fill: rgba(255,255,255,0.78); font: 700 13px var(--font-body); letter-spacing: 0.18em; }
    .an-pill-fig           { fill: #ffffff; font: 700 40px var(--font-display); letter-spacing: -0.01em; }
    .an-pill-fig--cost     { fill: #ff9a6a; }
    .an-pill-sub           { fill: rgba(255,255,255,0.5); font: 600 10.5px var(--font-body); letter-spacing: 0.14em; text-transform: uppercase; }
    .an-pill-bar-t         { fill: rgba(255,255,255,0.10); }
    .an-pill-bar-f         { transform-box: fill-box; transform-origin: left center; transform: scaleX(0); }
    .an-pill-bar-f--cost     { fill: #ff9a6a; }
    .an-pill-bar-f--time     { fill: #8fb8ff; }
    .an-pill-bar-f--resource { fill: #5fe3a0; }
    .an-scene.playing .an-pill-bar-f--cost     { animation: anBarFill 1.0s 5.7s cubic-bezier(.4,0,.2,1) forwards; }
    .an-scene.playing .an-pill-bar-f--resource { animation: anBarFill 1.0s 6.3s cubic-bezier(.4,0,.2,1) forwards; }
    .an-scene.playing .an-pill-bar-f--time     { animation: anBarFill 1.0s 6.0s cubic-bezier(.4,0,.2,1) forwards; }
    @keyframes anBarFill { from { transform: scaleX(0); } to { transform: scaleX(var(--bar, 0.7)); } }

    /* ═══════════ Recommendation — the hotspot feeds AI, AI proposes, you decide ═══════════
       Continuity: the Analysis map carries over UNCHANGED on the right, its amber cost
       flare still pulsing on the bottleneck. Human–AI–human: you aim → AI proposes →
       you decide. Three beats:
         Beat 1 (0.35–4.9s)  Caption types; priority chips (Cost / Time / Resource) land
                             in the left column over a NEUTRAL map; the cursor picks
                             Cost and the map answers — every cost hotspot and the
                             pulsing bottleneck flare bloom on at once (3.0s).
         Beat 2 (4.9–10.6s)  Caption swaps; the engine (the PM/TM motif) returns and the
                             flaring hotspot streams its data INTO it (card 1 reversed);
                             ordered tokens drop out and a proposal card materialises
                             beneath — specific fix, mechanism, projected impact in the
                             Analysis colours.
         Beat 3 (10.6s+)     Caption swaps; the proposal connects back to the map (dashed
                             link, green target ring + bolt on the bottleneck, rework
                             loop ghosts out, flare cools) and Review / Approve appear —
                             held, unclicked. Nothing applies itself. */

    /* ── cost hotspots + lead flare: hidden until the cursor picks Cost (3.0s),
       then the whole cost view blooms onto the map at once — the map answering
       the user's selection. Flare pulses from 3.7s, cools in Beat 3. ── */
    .rc-spot { fill: #ff9a6a; opacity: 0; transform-box: fill-box; transform-origin: center; transform: scale(0.2);
      filter: drop-shadow(0 0 5px rgba(255,154,106,0.85)); }
    .rc-scene.playing .rc-spot { animation: anDotIn 0.55s 3.0s cubic-bezier(.22,1,.36,1) both; }
    .rc-scene.playing .rc-spot.rc-ghost { animation: anDotIn 0.55s 3.0s cubic-bezier(.22,1,.36,1) both, rcGhost 0.9s 11.3s ease forwards; }
    .rc-flare-glow { fill: rgba(255,154,106,0.20); opacity: 0; transform-box: fill-box; transform-origin: center; }
    .rc-flare-ring { fill: none; stroke: #ff9a6a; stroke-width: 2.4; opacity: 0; transform-box: fill-box; transform-origin: center;
      filter: drop-shadow(0 0 8px rgba(255,154,106,0.85)); }
    .rc-scene.playing .rc-flare-glow { animation: rcGlowIn 0.7s 3.0s ease forwards, anFlareGlowPulse 2.6s 3.7s ease-in-out infinite, rcFadeOut 0.9s 11.3s ease forwards; }
    .rc-scene.playing .rc-flare-ring { animation: rcRingBloom 0.7s 3.0s ease forwards, anFlareRingPulse 2.4s 3.7s ease-in-out infinite, rcFadeOut 0.9s 11.3s ease forwards; }
    @keyframes rcGlowIn { from { opacity: 0; } to { opacity: 0.85; } }
    @keyframes rcRingBloom { from { opacity: 0; transform: scale(0.5); } to { opacity: 0.95; transform: scale(1); } }

    /* ── Beat 1: priority selector — YOU aim the AI before it moves ── */
    .rc-prio { opacity: 0; }
    .rc-scene.playing .rc-prio { animation: piFade 0.5s 1.9s ease both; }
    .rc-pchip-box { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.16); stroke-width: 1.2; }
    .rc-pchip-label { fill: rgba(255,255,255,0.78); font: 700 13px var(--font-body); letter-spacing: 0.04em; }
    .rc-pdot--cost { fill: #ff9a6a; } .rc-pdot--time { fill: #8fb8ff; } .rc-pdot--resource { fill: #5fe3a0; }
    .rc-scene.playing .rc-pchip--sel .rc-pchip-box   { animation: rcPrioOn 0.5s 3.0s ease forwards; }
    .rc-scene.playing .rc-pchip--sel .rc-pchip-label { animation: rcPrioLabelOn 0.5s 3.0s ease forwards; }
    @keyframes rcPrioOn { to { fill: rgba(255,154,106,0.14); stroke: #ff9a6a; } }
    @keyframes rcPrioLabelOn { to { fill: #ffffff; } }
    /* the cursor that makes the choice (fades out once the choice is made) */
    .rc-prio-cursor { opacity: 0; }
    .rc-prio-cursor path { fill: #ffffff; stroke: #04102f; stroke-width: 1; }
    .rc-scene.playing .rc-prio-cursor { animation: rcCursorIn 0.4s 2.5s ease forwards, rcClick 0.5s 2.9s ease, rcFadeOut 0.5s 3.8s ease forwards; }
    @keyframes rcClick { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-2px, -2px) scale(0.9); } }
    /* the map answers: a single surge on the most expensive hotspot */
    .rc-prio-surge { fill: none; stroke: #ff9a6a; stroke-width: 2.5; opacity: 0; transform-box: fill-box; transform-origin: center;
      filter: drop-shadow(0 0 8px rgba(255,154,106,0.8)); }
    .rc-scene.playing .rc-prio-surge { animation: rcSurge 1.1s 3.3s ease-out forwards; }
    @keyframes rcSurge { 0% { opacity: 0; transform: scale(0.55); } 25% { opacity: 0.95; } 100% { opacity: 0; transform: scale(1.9); } }

    /* ── engine (PM motif, Beat 2) + hotspot→engine stream + engine→card tokens ── */
    .rc-scene.playing .pm-eng      { animation: pmFade 0.6s 5.6s ease both; }
    .rc-scene.playing .pm-eng-halo { animation: pmEngHalo 0.7s 6.0s ease forwards; }
    .rc-scene.playing .pm-eng-core { animation: pmEngPulse 1.6s 6.0s ease-in-out infinite; }
    .rc-scene.playing .pm-eng-ring { animation: pmEngRotate 14s 6.0s linear infinite; }
    .rc-scene.playing .rc-rt  { animation: pmStream 1.3s ease-out infinite; }
    .rc-scene.playing .rc-out { animation: pmStream 0.55s ease-out both; }

    /* ── proposal card (Beat 2) ── */
    .rc-panel { fill: rgba(10,28,68,0.72); stroke: rgba(111,155,255,0.4); stroke-width: 1.4; opacity: 0;
      transform-box: fill-box; transform-origin: center; transform: translateY(10px) scale(0.97); }
    .rc-tag   { fill: #bcd4ff; font: 700 9.5px var(--font-body); letter-spacing: 0.12em; opacity: 0; }
    .rc-title { fill: #ffffff; font: 700 19px var(--font-display); opacity: 0; }
    .rc-mech  { fill: rgba(255,255,255,0.62); font: 600 12.5px var(--font-body); opacity: 0; }
    .rc-div   { stroke: rgba(255,255,255,0.12); stroke-width: 1; opacity: 0; }
    .rc-proj  { fill: rgba(255,255,255,0.45); font: 700 9.5px var(--font-body); letter-spacing: 0.16em; opacity: 0; }
    .rc-row   { opacity: 0; }
    .rc-row-label { fill: rgba(255,255,255,0.66); font: 600 12.5px var(--font-body); letter-spacing: 0.04em; }
    .rc-row-val   { font: 700 15px var(--font-display); }
    .rc-val--cost     { fill: #ff9a6a; }
    .rc-val--time     { fill: #8fb8ff; }
    .rc-val--resource { fill: #5fe3a0; }
    .rc-row-dot--cost     { fill: #ff9a6a; filter: drop-shadow(0 0 5px rgba(255,154,106,0.85)); }
    .rc-row-dot--time     { fill: #8fb8ff; filter: drop-shadow(0 0 5px rgba(143,184,255,0.85)); }
    .rc-row-dot--resource { fill: #5fe3a0; filter: drop-shadow(0 0 5px rgba(95,227,160,0.75)); }
    .rc-scene.playing .rc-panel { animation: rcCardIn 0.6s 7.7s cubic-bezier(.22,1,.36,1) both; }
    .rc-scene.playing .rc-tag   { animation: piFade 0.5s 8.0s ease both; }
    .rc-scene.playing .rc-title { animation: rcRise 0.5s 8.2s ease both; }
    .rc-scene.playing .rc-mech  { animation: rcRise 0.5s 8.4s ease both; }
    .rc-scene.playing .rc-div   { animation: piFade 0.4s 8.55s ease both; }
    .rc-scene.playing .rc-proj  { animation: piFade 0.5s 8.65s ease both; }
    .rc-scene.playing .rc-row   { animation: rcRise 0.5s ease both; }  /* per-row inline delays */

    /* ── Beat 3: proposal → map preview (dashed link, target ring + bolt, rework ghosts) ── */
    .rc-link { fill: none; stroke: #5fe3a0; stroke-width: 1.8; stroke-dasharray: 6 7; opacity: 0;
      filter: drop-shadow(0 0 4px rgba(95,227,160,0.5)); }
    .rc-target-ring { fill: none; stroke: #5fe3a0; stroke-width: 2.4; stroke-dasharray: 7 6; opacity: 0;
      transform-box: fill-box; transform-origin: center; filter: drop-shadow(0 0 7px rgba(95,227,160,0.7)); }
    .rc-bolt { opacity: 0; transform-box: fill-box; transform-origin: center; }
    .rc-bolt-bg { fill: #0a1c44; stroke: #5fe3a0; stroke-width: 1.6; }
    .rc-bolt-glyph { fill: #5fe3a0; }
    .rc-fixlabel { fill: #9defc4; font: 700 12px var(--font-body); letter-spacing: 0.06em; opacity: 0; }
    .rc-scene.playing .rc-ghost { animation: rcGhost 0.9s 11.3s ease forwards; }
    .rc-scene.playing .rc-link { animation: rcDashIn 0.7s 11.4s ease forwards; }
    .rc-scene.playing .rc-target-ring { animation: rcDashIn 0.6s 11.6s ease forwards, rcRingSpin 26s 11.6s linear infinite; }
    .rc-scene.playing .rc-bolt { animation: rcPopIn 0.5s 11.9s cubic-bezier(.22,1,.36,1) both; }
    .rc-scene.playing .rc-fixlabel { animation: piFade 0.5s 12.1s ease both; }

    /* ── Beat 3: decision state — Review / Approve, cursor hovering, held ── */
    .rc-btn { opacity: 0; }
    .rc-btn-box { fill: none; stroke: rgba(255,255,255,0.4); stroke-width: 1.3; }
    .rc-approve-box { fill: #1356d6; stroke: #6f9bff; stroke-width: 1.3; }
    .rc-btn-label { fill: #fff; font: 700 12px var(--font-body); letter-spacing: 0.04em; }
    .rc-cursor { opacity: 0; }
    .rc-cursor path { fill: #ffffff; stroke: #04102f; stroke-width: 1; }
    .rc-scene.playing .rc-btn { animation: piFade 0.5s 12.3s ease both; }
    .rc-scene.playing .rc-approve-box { animation: rcApprove 1.8s 13.1s ease-in-out infinite; }
    .rc-scene.playing .rc-cursor { animation: rcCursorIn 0.5s 12.7s ease forwards, rcCursorNudge 1.6s 13.3s ease-in-out infinite; }

    @keyframes rcCardIn { from { opacity: 0; transform: translateY(10px) scale(0.97); } to { opacity: 1; transform: none; } }
    @keyframes rcRise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes rcFadeOut { to { opacity: 0; } }
    @keyframes rcGhost { to { opacity: 0.15; } }
    @keyframes rcDashIn { from { opacity: 0; } to { opacity: 0.95; } }
    @keyframes rcRingSpin { to { transform: rotate(360deg); } }
    @keyframes rcPopIn { 0% { opacity: 0; transform: scale(0.4); } 60% { opacity: 1; transform: scale(1.15); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes rcApprove { 0%, 100% { opacity: 1; } 50% { opacity: 0.72; } }
    @keyframes rcCursorIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes rcCursorNudge { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(0, -3px); } }

    /* ═══════════ Simulation — clone it, replay the fix, prove it ═══════════
       Continuity: the map carries over (rework loop intact — the fix is approved but
       not yet applied) and is wrapped in a dashed DIGITAL TWIN boundary: the change
       is tested on a copy, never on the business. Three beats:
         Beat 1 (0.35–4.9s)  Caption types; the sandbox boundary draws around the map,
                             a shimmer marks the copy, the DIGITAL TWIN tag lands.
         Beat 2 (4.9–10.6s)  Caption swaps; the fix applies inside the twin (green
                             target ring on the bottleneck, rework loop dissolves) and
                             simulated cases replay along the spine while the counter
                             runs to 312,847 — the case volume from Process Reality.
         Beat 3 (10.6s+)     Caption swaps; results panel — before → after across cost,
                             time and resource, marked PROJECTED, figures matching the
                             Recommendation card; verdict: bottleneck cleared. */
    .si-box { fill: rgba(143,184,255,0.03); stroke: rgba(143,184,255,0.45); stroke-width: 1.6; stroke-dasharray: 8 7; opacity: 0; }
    .si-scene.playing .si-box { animation: rcDashIn 0.8s 2.2s ease forwards; }
    .si-shimmer { fill: rgba(180,220,255,0); pointer-events: none; }
    .si-scene.playing .si-shimmer { animation: siShimmer 0.9s 2.7s ease; }
    @keyframes siShimmer { 0%, 100% { fill: rgba(180,220,255,0); } 40% { fill: rgba(180,220,255,0.10); } }
    .si-twin-tag-bg { fill: rgba(10,28,68,0.9); stroke: rgba(143,184,255,0.45); stroke-width: 1; opacity: 0; }
    .si-twin-tag { fill: #bcd4ff; font: 700 10px var(--font-body); letter-spacing: 0.16em; opacity: 0; }
    .si-scene.playing .si-twin-tag-bg, .si-scene.playing .si-twin-tag { animation: piFade 0.5s 3.1s ease both; }
    /* Beat 2 — the fix lands in the twin */
    .si-ring { fill: none; stroke: #5fe3a0; stroke-width: 2.4; stroke-dasharray: 7 6; opacity: 0; transform-box: fill-box; transform-origin: center;
      filter: drop-shadow(0 0 7px rgba(95,227,160,0.7)); }
    .si-scene.playing .si-ring { animation: rcDashIn 0.5s 5.8s ease forwards, rcRingSpin 26s 5.8s linear infinite; }
    /* the fix removes variants: rework loop, upper detour, top-right arc all dissolve */
    .si-scene.playing .si-gone { animation: rcFadeOut 0.9s 6.2s ease forwards; }
    /* simulated cases ride the spine AND the remaining variants (animateMotion paths);
       motion free-runs from load — visibility is gated to Beat 2 */
    .si-simtok { fill: #c5e9ff; opacity: 0; filter: drop-shadow(0 0 5px rgba(0,179,255,0.9)); }
    .si-scene.playing .si-simtok { animation: piFade 0.6s 6.6s ease forwards; }
    .si-count-label { fill: rgba(255,255,255,0.55); font: 700 9.5px var(--font-body); letter-spacing: 0.14em; opacity: 0; }
    .si-count { fill: #ffffff; font: 700 24px var(--font-display); opacity: 0; }
    .si-scene.playing .si-count, .si-scene.playing .si-count-label { animation: piFade 0.5s 6.6s ease both; }
    /* Beat 3 — results panel (left column, same geometry as cards 3–4) */
    .si-panel { fill: rgba(10,28,68,0.72); stroke: rgba(111,155,255,0.4); stroke-width: 1.4; opacity: 0; transform-box: fill-box; transform-origin: center; transform: translateY(10px) scale(0.97); }
    .si-scene.playing .si-panel { animation: rcCardIn 0.6s 11.3s cubic-bezier(.22,1,.36,1) both; }
    .si-ptag { fill: #bcd4ff; font: 700 9.5px var(--font-body); letter-spacing: 0.12em; opacity: 0; }
    .si-scene.playing .si-ptag { animation: piFade 0.5s 11.6s ease both; }
    .si-row { opacity: 0; }
    .si-scene.playing .si-row { animation: rcRise 0.5s ease both; }  /* per-row inline delays */
    .si-row-label { fill: rgba(255,255,255,0.66); font: 600 12.5px var(--font-body); letter-spacing: 0.04em; }
    .si-before { fill: rgba(255,255,255,0.38); font: 600 12px var(--font-body); }
    .si-strike { stroke: rgba(255,255,255,0.35); stroke-width: 1.2; }
    .si-after { font: 700 16px var(--font-display); }
    .si-after--cost { fill: #ff9a6a; } .si-after--time { fill: #8fb8ff; } .si-after--resource { fill: #5fe3a0; }
    .si-row-dot--cost     { fill: #ff9a6a; filter: drop-shadow(0 0 5px rgba(255,154,106,0.85)); }
    .si-row-dot--time     { fill: #8fb8ff; filter: drop-shadow(0 0 5px rgba(143,184,255,0.85)); }
    .si-row-dot--resource { fill: #5fe3a0; filter: drop-shadow(0 0 5px rgba(95,227,160,0.75)); }
    .si-verdict { opacity: 0; }
    .si-scene.playing .si-verdict { animation: rcRise 0.5s 12.9s ease both; }
    .si-check-circ { fill: rgba(95,227,160,0.14); stroke: #5fe3a0; stroke-width: 1.6; }
    .si-check-mark { fill: none; stroke: #5fe3a0; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .si-verdict-text { fill: #9defc4; font: 700 12px var(--font-body); }

    /* ═══════════ Monitor — live, checked, drift caught ═══════════
       Continuity: the map returns WITHOUT the rework loop — the fix from cards 4–5
       is deployed. Calm green status language over the deck's blue map. Three beats:
         Beat 1 (0.35–4.9s)  Caption types; LIVE badge lands, real cases flow along
                             the spine, the monitor panel opens with a steady trace.
         Beat 2 (4.9–9.3s)   Caption swaps; the three baselines report in — cost,
                             time, resource at their new levels, all ON TRACK.
         Beat 3 (9.3s+)      Caption swaps; one node drifts (warms amber, flagged on
                             the map) and the TIME baseline flips to DRIFT with it. */
    .mo-live { opacity: 0; }
    .mo-live-dot { fill: #5fe3a0; transform-box: fill-box; transform-origin: center; filter: drop-shadow(0 0 6px rgba(95,227,160,0.9)); }
    .mo-live-label { fill: rgba(255,255,255,0.78); font: 700 11px var(--font-body); letter-spacing: 0.16em; }
    .mo-scene.playing .mo-live { animation: piFade 0.5s 2.0s ease both; }
    .mo-scene.playing .mo-live-dot { animation: moBlink 2.2s 2.2s ease-in-out infinite; }
    @keyframes moBlink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.82); } }
    /* live cases riding the cleaned-up map — spine and remaining variants */
    .mo-tok { fill: #c5e9ff; opacity: 0; filter: drop-shadow(0 0 5px rgba(0,179,255,0.85)); }
    .mo-scene.playing .mo-tok { animation: piFade 0.6s 2.4s ease forwards; }
    /* monitor panel (left column, same geometry as cards 3–5) */
    .mo-panel { fill: rgba(10,28,68,0.72); stroke: rgba(111,155,255,0.4); stroke-width: 1.4; opacity: 0; transform-box: fill-box; transform-origin: center; transform: translateY(10px) scale(0.97); }
    .mo-scene.playing .mo-panel { animation: rcCardIn 0.6s 2.4s cubic-bezier(.22,1,.36,1) both; }
    .mo-phead { opacity: 0; }
    .mo-scene.playing .mo-phead { animation: piFade 0.5s 2.8s ease both; }
    .mo-phead-dot { fill: #5fe3a0; transform-box: fill-box; transform-origin: center; filter: drop-shadow(0 0 5px rgba(95,227,160,0.9)); }
    .mo-scene.playing .mo-phead-dot { animation: moBlink 2.2s 3.0s ease-in-out infinite; }
    .mo-phead-label { fill: rgba(255,255,255,0.78); font: 700 10.5px var(--font-body); letter-spacing: 0.14em; }
    /* steady trace: a bright segment loops along the baseline */
    .mo-ekg-base { fill: none; stroke: rgba(143,184,255,0.18); stroke-width: 1.6; }
    .mo-ekg { fill: none; stroke: #5fe3a0; stroke-width: 2; stroke-linecap: round; opacity: 0;
      filter: drop-shadow(0 0 5px rgba(95,227,160,0.6)); stroke-dasharray: 150 850; }
    .mo-scene.playing .mo-ekg { animation: piFade 0.5s 3.0s ease forwards, moTrace 3.6s 3.0s linear infinite; }
    @keyframes moTrace { from { stroke-dashoffset: 1000; } to { stroke-dashoffset: 0; } }
    /* baselines (Beat 2) */
    .mo-row { opacity: 0; }
    .mo-scene.playing .mo-row { animation: rcRise 0.5s ease both; }  /* per-row inline delays */
    .mo-row-label { fill: rgba(255,255,255,0.66); font: 600 12px var(--font-body); letter-spacing: 0.04em; }
    .mo-row-val { fill: #ffffff; font: 700 13.5px var(--font-display); }
    .mo-chip-ok { fill: rgba(95,227,160,0.10); stroke: rgba(95,227,160,0.55); stroke-width: 1; }
    .mo-chip-ok-t { fill: #7be8ad; font: 700 9px var(--font-body); letter-spacing: 0.1em; }
    .mo-row-dot--cost { fill: #ff9a6a; } .mo-row-dot--time { fill: #8fb8ff; } .mo-row-dot--resource { fill: #5fe3a0; }
    /* Beat 3 — drift: the TIME baseline flips while the map node warms + flag pops */
    .mo-scene.playing .mo-ok-swap { animation: rcFadeOut 0.5s 10.7s ease forwards; }
    .mo-drift-in { opacity: 0; }
    .mo-scene.playing .mo-drift-in { animation: piFade 0.5s 10.7s ease both; }
    .mo-val-drift { fill: #ffc24d; font: 700 13.5px var(--font-display); }
    .mo-chip-drift { fill: rgba(255,194,77,0.12); stroke: rgba(255,194,77,0.65); stroke-width: 1; }
    .mo-chip-drift-t { fill: #ffd98a; font: 700 9px var(--font-body); letter-spacing: 0.1em; }
    /* drift IS a new variant: an amber edge nobody designed draws itself onto the
       map (the old rework loop creeping back), and cases start using it */
    .mo-newvar { fill: none; stroke: #ffc24d; stroke-width: 2.2; stroke-linecap: round;
      stroke-dasharray: 1 1; stroke-dashoffset: 1; opacity: 0;
      filter: drop-shadow(0 0 5px rgba(255,194,77,0.55)); }
    .mo-scene.playing .mo-newvar { animation: pmDraw 0.8s 10.2s ease forwards; }
    .mo-newvar-tok { fill: #ffd98a; opacity: 0; filter: drop-shadow(0 0 5px rgba(255,194,77,0.9)); }
    .mo-scene.playing .mo-newvar-tok { animation: piFade 0.5s 11.0s ease forwards; }
    .mo-flag { opacity: 0; }
    .mo-scene.playing .mo-flag { animation: moFlagIn 0.6s 10.6s cubic-bezier(.22,1,.36,1) forwards; }
    @keyframes moFlagIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .mo-flag-pole { stroke: #ffce85; stroke-width: 1.6; }
    .mo-flag-flag { fill: #ffc24d; }
    .mo-flag-label { fill: #ffd98a; font: 700 10.5px var(--font-body); letter-spacing: 0.08em; }

    /* reduced motion — settle every card on its final, readable frame */
    @media (prefers-reduced-motion: reduce) {
      .pi-narr.wipe { animation: none !important; }
      .an-scanwrap { opacity: 0 !important; animation: none !important; }
      .an-dot, .an-pill { opacity: 1 !important; transform: none !important; animation: none !important; }
      .an-flare-glow { opacity: 1 !important; animation: none !important; }
      .an-flare-ring { opacity: 0.95 !important; animation: none !important; transform: none !important; }
      .an-pulse { opacity: 0.85 !important; transform: none !important; animation: none !important; }
      .an-pill-bar-f { transform: scaleX(var(--bar, 0.7)) !important; animation: none !important; }
      /* Recommendation — settle on the Beat-3 end state: proposal up, fix previewed, held for approval */
      .rc-scene .pm-eng, .rc-scene .pm-eng-halo { opacity: 1 !important; animation: none !important; }
      .rc-scene .pm-eng-core, .rc-scene .pm-eng-ring { animation: none !important; transform: none !important; }
      .rc-rt, .rc-out { opacity: 0 !important; animation: none !important; }
      .rc-prio { opacity: 1 !important; animation: none !important; }
      .rc-prio-cursor, .rc-prio-surge { opacity: 0 !important; animation: none !important; }
      .rc-pchip--sel .rc-pchip-box { fill: rgba(255,154,106,0.14) !important; stroke: #ff9a6a !important; animation: none !important; }
      .rc-pchip--sel .rc-pchip-label { fill: #ffffff !important; animation: none !important; }
      .rc-flare-glow, .rc-flare-ring { opacity: 0 !important; animation: none !important; }
      .rc-spot { opacity: 0.85 !important; transform: none !important; animation: none !important; }
      .rc-spot.rc-ghost { opacity: 0.15 !important; }
      .rc-panel, .rc-tag, .rc-title, .rc-mech, .rc-div, .rc-proj, .rc-row, .rc-btn, .rc-cursor, .rc-bolt, .rc-fixlabel
        { opacity: 1 !important; transform: none !important; animation: none !important; }
      .rc-link, .rc-target-ring { opacity: 0.95 !important; transform: none !important; animation: none !important; }
      .rc-ghost { opacity: 0.15 !important; animation: none !important; }
      /* Simulation — settle on the Beat-3 end state: twin framed, fix applied, results in */
      .si-box, .si-twin-tag, .si-twin-tag-bg, .si-count, .si-count-label,
      .si-panel, .si-ptag, .si-row, .si-verdict { opacity: 1 !important; transform: none !important; animation: none !important; }
      .si-ring { opacity: 0.95 !important; transform: none !important; animation: none !important; }
      .si-gone, .si-simtok { opacity: 0 !important; animation: none !important; }
      .si-shimmer { animation: none !important; }
      /* Monitor — settle on the drift-caught end state */
      .mo-live, .mo-panel, .mo-phead, .mo-ekg, .mo-row, .mo-flag, .mo-drift-in
        { opacity: 1 !important; transform: none !important; animation: none !important; }
      .mo-newvar { opacity: 0.92 !important; stroke-dashoffset: 0 !important; animation: none !important; }
      .mo-tok, .mo-newvar-tok, .mo-ok-swap { opacity: 0 !important; animation: none !important; }
    }

    /* ── Responsive ── */
    @media (max-width: 1000px) {
      #rail { flex-wrap: wrap; }
      .pi-card { flex: 1 1 28%; }
      .pi-card:not(:last-child)::after { display: none; }
    }
    @media (max-width: 720px) {
      #bottom, .pi-big { padding-left: 18px; padding-right: 18px; }
      .pi-big { inset: 24px 18px 84px; }
      #caption, #rail-wrap, #pillar-wrap { padding-left: 18px; padding-right: 18px; }
    }
  </style>
